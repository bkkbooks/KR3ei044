body:
  text: 卷六生育門臨産一妊娠十月已足腹內如覺動轉疼痛者須舒體仰臥或時時緩步使兒身正靜以待之至其生育之時自然順下倘一慌忙變必他出産室二産室之內四時務要寒溫適中若太熱太寒均不相宜夏月必須清涼勿令炎熱致産母中暑暈迷倘有其事不妨少與涼水以解之後隨證調理冬月必須溫暖勿令寒冷以致血凝難産當多備火爐使産母腰背下身就火烘之其産自易穩婆三臨産之家必用穩婆須預擇老成經練明白之人無故切莫令其先使手法如試水探漿等事但令囑寬心寧耐以待生時如用狡猾之婦前已應張後復許李草率了事希圖微謝其情莫測嘗有之矣驚生四産房之內不可多人蓋人多則語聲喧譁産母之心必驚驚則心虛膽怯及至産時多致困乏號曰驚生有如此者須急急拼出只留老成服役一二人使寂靜而無嘈雜之聲則母心始安安則其胎亦寧靜矣試胎弄胎五妊娠八九個月時或腹中痛痛定依然如常者此名試胎宜養血以安其胎若月數已足腹痛或作或止腰不痛者此名弄胎二者均非正産之時切勿躁擾疑惑惟宜寧靜以待其時坐草六凡産婦坐草最要及時不可太早若兒身未順寧可遲遲寬心以待倘坐草太早非正産之時妄使産母用力兒身猶未轉順因力逼迫難存遂至橫生逆産雖悔無及矣臨盆七凡兒之生自有其時時至則兒身轉順頭頂正當産門胞漿大來腰重腹痛穀道挺迸産母中指中節或本節跳動者乃為正産之時也方可臨盆用力一送兒自順生矣交骨不開八交骨不開陰氣虛也又有因初次胎産骨縫緊狹者均宜通其陰氣直達至陰之所惟開骨散為最良開骨散本門一盤腸産九盤腸産者臨産之時其腸先拖出及兒已生腸復收入有不能收者須以萆麻仁搗爛貼於頂心內服升補之劑如補中益氣湯或八珍十全大補等湯加升麻以升舉之其腸自收矣補中益氣湯見月經門四八八珍湯見月經門二三十全大補湯見月經門二四橫産十兒身未順用力太早逼其身橫遂先露手或先露臂不能生下者切莫喧徨宜令産母安然仰臥命穩婆剪去指甲香油塗手先推其手臂直上漸漸逼身以中指摩其肩或以指攀其耳務使兒身順正為妙後用助氣養血之劑一服可催而生矣倒産十一産母用力太早致兒不能回轉便直下先露其足者不可驚恐當令産母仰臥命香生之人椎其足入上安然聽候兒自順生矣偏産十二兒身未正用力早逼致兒頭偏在左腿或偏於右腿故不能生下當令産母仰臥次令穩婆以手正其頭令兒頭頂端正産母用力一送便即生下若兒頭後骨偏在穀道只露其額當令穩婆以綿衣炙溫裡手於穀道外方輕輕推兒頭正令産母用力一送兒即生也礙産十三兒身已順正頂露而不能生下者因兒身轉時臍帶攀其肩也當令産母仰臥命穩婆款款推兒近上徐徐引手以中指按兒肩下撥其臍帶仍須候兒身正順方令産母用力兒即生矣難産十四難産之由非只一端或安逸貪睡則氣滯不行或奉養過甚則胞肥太厚或臨産驚恐則氣怯或用力太旱則困乏或胞傷血出則血壅産路或胞漿破早則液幹道枯皆致難産之由也臨證之工宜當詳審催生十五胎兒十月滿足産母氣血盛實如瓜熟蒂落果熟香飄生育自然奚待催也倘産母形氣羸弱或臨盆坐草太早以致母力困乏者此不容不催也第催之之法亦各有宜如因力逼致有橫倒或誤破胞漿産路乾澀者咸以潤滑為主羸弱困乏者惟助氣血為要也若見橫生逆産者推正之後宜催生如意散或三退散胞漿破而産路乾澀者滑胎散或佛手散加冬葵子一合尤妙形體羸弱氣血虧乏者惟保産萬全湯為最此産婦常宜之劑誠摻萬全之功者也催生如意散本門二三退散本門三滑胎散本門四佛手散見月經門八保産萬全湯本門五斷臍法十六嬰兒初生先用剪刀向火烘熱煎斷臍帶次用火器繞臍帶烙之當以六才為度不可過為短長短則傷臟長則損肌斷訖又用烙臍餅子安灸臍上以防風邪外入隨用胡粉散敷臍帶間用軟絹新綿封裡之以避尿濕風邪如藥不備即以細熟艾一塊照依前法封裡如斷臍時胞衣未下斷臍後急以物墜繫於帶下不但免其風邪乘入旦無胞衣難下之患烙臍餅子本門六胡粉散本門七生育門匯方開骨散一當歸五錢龜板三錢醋炙研川芎二錢婦人發一團用生産過者燒存性水煎眼嘗用催生多無産後諸患催生如意散二治橫生例産人參乳香各一錢去油辰砂五分水飛上為末臨産時急用雞子清一個調藥末再用薑汁調開冷服即時順生子母無恙三退散三治橫生難産子死腹中蛇退一條蟬退十四個人退雞蛋大一團即男子頭髮上俱燒灰為末分三服酒調下滑胎散四催生如神益元散一兩蛇退一條燒灰存性蟬退全者五個燒灰穿山甲一片燒灰存性男子亂髮一團香油熬化上為細末用水一碗和藥煎二沸入發灰拌勻冷定服之立下保産萬全湯五人參三錢當歸三錢酒洗川芎一錢桃仁十三粒不去皮尖乾薑一錢炮焦黃色甘草六分炙牛膝梢二錢紅花三錢酒炒肉桂八分刮去粗皮加膠棗一枚水煎食前溫服如産婦壯實及無力服人參者去參用之其效尚倍於佛手散多矣烙臍餅子六豆豉黃蠟麝香少許上以豆豉麝香研勻溶蠟量臍大小捻為餅灸用胡粉散七胡粉甑帶灰乾薑白石脂棉灰各等分麝香少許上共為細末每用一錢敷臍上封之救兒捧母心方八臨産時久不見兒下産婦暈絶將死者若心中有熱氣必是兒捧住母心致令産婦暈憒暴死急以引入心經之藥分解兒手方得下也蓋兒手捉一物最緊藥力一到兒手自軟解脫也出醫學心鏡録乳香五錢去油麝香六分官窪一錢去粗皮上為細末作一服淡黃酒送下
