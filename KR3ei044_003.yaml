body:
  text: 卷三帶下門五色帶下帶下者陰中穢物時下也由五志不遂或産育房勞傷及衝任風邪乘間入於胞中血受其邪隨人臟氣寒熱虛濕而化其色有五故有五臟之分焉色青者屬肝為風濕色赤者屬心為熱濕色黃者屬脾為虛濕色白者屬肺為清濕色黑者屬腎為寒濕也治法有六曰補瀉燥澀溫寒也隨宜而施靡有不效若帶已久更審其淋漓之物氣臭或腥而穢者系胞中敗血所化倘似瘡膿乃內癰膿潰而致下如米泔兼尿竅不利因膀胱蓄熱名為白濁此出自溺孔若如膠黏小水清長名曰白淫來自胞中由乎精道者也經曰思想無窮所願不得意淫於外入房太甚化為白淫也若因六淫之邪入於胞中者少腹多痛宜吳茱萸湯加減主之色白黑而清稀者虛寒也色白者補中益氣湯色黑者六味地黃湯色黃而淡者六君於湯或加味歸脾湯胞中痛色兼黃赤者濕熱也知柏四物湯胞中冷痛者寒濕也加味四物湯日久滑脫者照加法施用五色相兼者濕熱尤甚也清白散主之五色相雜皆從濕化若少腹脹痛汙水綿綿屬濕熱者宜導水丸屬濕寒者宜萬安丸其寒熱之辨在尺脈有力無力間分也人肥者多屬痰濕蒼柏樗皮丸白濁白淫亦帶類也宜威喜丸固精丸帶有因瘀血所比者以通逐為主因內癰膿出者當詳瘡瘍施治毋容混也吳茱萸湯見月經門三一本門八附加減法補中益氣湯見月經門四八六味地黃湯見月經門十五六君子湯見經閉門五加味歸脾湯見崩漏門三知柏四物湯見崩漏門一加味四物湯本門一清白散本門二導水丸本門三萬安丸本門四蒼柏樗皮丸本門五威喜丸本門六固精丸本門七帶下門匯方加味四物湯一熟地三錢當歸二錢酒洗白芍二錢酒炒川芎一錢附子一錢炮炮薑一錢肉桂一錢水煎服日久滑脫者加升麻柴胡舉之龍骨牡蠣石脂澀之清白散二生地酒洗當歸酒洗白芍酒炒川芎黃柏鹽水泡椿根皮酒炒貝母各一錢去心薑炭甘草各五分薑三片水煎溫服色赤加地榆荊芥黃芩濕加蒼朮白朮滑加龍骨牡蠣久則與四君湯合用導水丸三牽牛頭末滑石各四兩水飛黃芩川大黃各二兩上末蒸餅為丸滾白湯送眼丸數量虛實服萬安丸四牽牛頭末胡椒廣本香小茴香各等分焙上末水泛為丸量虛實白湯送服蒼柏樗皮丸五蒼朮米泔制黃柏鹽水泡樗根皮南星薑炙半夏海石煅川芎香附乾薑各等分炮上末醋和丸桐子大每服五六十丸白湯下暑月去乾薑加滑石威喜丸六白苓四兩去皮作塊用豬苓二錢半同於磁器內煮二十餘沸取出曬乾不用豬苓黃蠟四兩上以白苓為末煉黃蛤為丸如彈子大空心細嚼滿口生津徐徐咽服以小便清為度忌米醋只吃粳醋忌動氣惱固精丸七牡蠣煅粉菟絲子酒蒸焙韭子白龍骨五味子白茯苓桑螵蛸酒製白石脂各等分上為末酒糊丸如桐子大每服七十丸空心鹽湯下吳茱萸湯八見月經門三一色赤或黃而濁黏者熱也加黃連梔子色青者加防風梔子積聚門積聚癥瘕痞瘀血血蠱名義一五臟氣積名曰積故積有五六府氣聚名曰聚故聚有六難經有心肝脾肺腎五臟之積而無六聚蓋以積為血病而聚為氣病耳故東垣有五積丸方治法巢氏病源載七症八瘕但有八瘕名證而無七症病形其他方書亦不概見大抵又以症為氣病而瘕為血病也夫病皆起於氣必氣聚而後血凝不必過泥於黃青燥血脂狐蛇鱉等名但以牢固不移有定處者為症為積推移轉動忽聚忽散者為瘕為聚可也若夫痞者痞悶不通氣道壅塞之謂瘀血者血瘀腹中未成堅塊之形蓄之既久必成血蠱矣凡此諸證皆由新産之後與經行之時不謹調避以致風冷外襲邪正相傳結於腹中而成也癥瘕證治二症者有所徵驗瘕者聚散無常由飲食失節脾胃虧損邪正相傳結於腹中因氣上下攻築疼痛也大七氣湯主之脾胃虧損者芎歸六君湯大七氣湯本門一芎歸六君湯本門二食症證治三婦人經行産後臟府虛弱脾胃既虧貪食生冷之物不能消化與臟氣互相摶聚結成堅塊牢固不移口漸長大者宜先開滯消積繼固脾氣可也烏藥散主之烏藥散本門三血症證治四婦人産後經行之時臟氣已虛或被風冷相干或為飲食所傷與血摶結遂成顆塊牢固不移腹脅脹痛內熱心煩食少善忘但頭汗出者血症也血竭散主之血竭散本門四痞證治五痞者胸膈窒塞痞悶不通也由中氣壅滯阻礙舒布而然當寬宣氣道繼培中州助氣丸主之助氣丸本門五積聚證治六積者著而不移聚者忽散忽凝乃痰飲宿食與氣血摶結也皆由脾胃虛弱不能輸運當健脾消食化痰滲飲理氣和血則積聚未有不愈音矣開鬱正氣散主之開鬱正氣散本門六瘀血血蠱證治七婦人經行之際或産後惡露未盡調攝不謹風冷乘客血室血得冷則凝停留個久未成堅塊者故名瘀血也其人必面色痿黃臍腹脹痛內熱哺熱乃其候也若不速治則必經閉蓄留既久變為血蠱血蠱之狀腹脹大筋紅起危惡可畏者也惡露未盡失笑散瘀血凝聚致經不通者玉燭散血蠱腹脹者桃奴散失笑散見崩漏門八玉燭散見月經門五三桃奴散本門七痃癖證治八婦人臍之兩旁有筋突起發則疼痛大者如臂小者如指狀類弓弦名曰痃僻在兩肋之間有時而痛者名曰癖二者皆陰陽不和經絡否隔飲食停滯不得宣流風冷之邪與氣血摶結而成形也若再受風冷發則形見疼痛益甚風冷弭釋則平復如初矣蔥白散兼烏雞丸主之蔥白散本門八烏雞丸本門九疝病證治九婦人少腹疼痛牽連腰脅高起名曰疝或因産後或因經水往來風冷乘客胞中接並吁氣故脅腹牽引刺痛也法當疏攻厥陰當歸散主之當歸散本門十治諸積大法十經曰邪之所湊其正必虛故凡治諸症積宜審形體之壯弱病勢之緩急詳分施治庶無虛虛之禍如身形壯盛脈證俱實者則直攻其積經所謂堅者削之也倘遇虛怯之輩氣血衰弱不任攻伐病勢雖盛當先扶正氣俟正氣漸長再攻其病蓋實者邪氣也虛者正氣也若不養正辟邪鮮有不誤者經曰大積大聚其可犯也衰其大半而上過者死潔古云養正積自除可謂得經旨者矣積聚門匯方大七氣湯一三稜莪茂各煨切青皮去穰陳皮去白木香藿香益智仁桔梗肉佳甘草各七錢五分炙每服五錢水二盞煎一盞食前溫服芎歸六君湯二人參白朮土炒白苓橘皮半夏薑製炙草川芎當歸薑冬水煎服烏藥散三烏藥莪茂桂心當歸炒桃仁青皮木香各等分上為末每服二錢熱酒調下血竭散四真血竭如無紫礦代當歸赤芍藥浦黃延胡索各等分上研極細末每服一錢甲童便合好酒半大盞煎一沸溫調下方産下時一服上床良久再服其惡血自循經下行不致衝上免生百病助氣丸五三稜莪茂各用濕紙包灰火中煨透切片各二斤青皮去穰醋炒陳皮去白白朮各十五兩土炒枳殼麩炒檳榔木香各十兩上為末糊丸桐子大每服五十空滾水下開鬱正無散六白朮陳皮青皮香附山楂海粉潔梗茯苓砂仁延胡麥芽甘草神麯各等分炒上銼每服一兩生薑三片水煎服桃奴散七桃奴炒即桃樹上未熟不落之干桃子也雄鼠糞炒兩頭尖者是延胡索肉桂五靈脂香附縮砂仁桃仁各等分上為末每服三錢溫酒調下蔥白散八當歸熟地赤芍川芎人參茯苓枳殼肉桂厚朴乾薑木香青皮莪茂三稜茄香神麯麥芽苦楝子各等分上末加蔥白三寸食鹽五分煎服三錢大便結燥者去鹽加大黃大便自利加訶子烏雞丸九烏骨雄雞一隻要肉毛者烏藥蛇床子丹皮人參白朮黃耆各一兩蒼朮一兩五錢米泔浸切焙海桐皮肉桂去粗皮附子制川烏制紅花白芍莪朮陳皮各一兩延胡索木香肉蔻熟地焙琥珀草果各一兩五錢上藥細銼將雞湯撏去毛及腸肚放藥於內用新磁瓶以好酒一斗同煮令乾去雞骨以油單盛焙乾為細末煉蜜和丸如桐子大每服三十丸胎前産後傷寒蜜糖酒下胎前氣悶壯熱炒薑酒下赤白帶下生薑地黃酒下産後敗血注心重便炒薑灑下産後血塊填築心腹疼痛延胡酒下胎前嘔逆薑湯下催生炒蜀葵子酒下安胎鹽酒下室女經脈當通不通四肢疼痛紅花酒下血氣攻刺心腹疼痛煎當歸酒下血暈棕櫚燒灰酒調吞下血悶煎烏梅湯研碳砂下子宮久冷溫酒或棗湯下空心日一服血風勞人參酒吞下小腹㽱痛炒茴香鹽酒吞下血散四肢遍身虛浮黃腫赤小豆酒下血邪研硃砂麝香酒下常服溫酒醋湯任下空心食前服當歸散十當歸川芎各二錢鱉甲三錢醋炙吳萸桃仁十五粒赤芍肉桂各一錢檳榔青皮各八分木香莪茂川大黃各七分上為末每服一錢水一盞入於胭脂一錢同煎六分服食後
