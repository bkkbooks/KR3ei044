body:
  text: 卷八乳證門乳汁不行一産婦乳汁乃血液所化稟乎太陰之氣故其色白其不行者或因去血過多則氣虛血弱無可流通或瘀血停留則氣壅血滯必脹而且痛隨證施治可使必已既行之後飲食最宜甘淡蓋乳由氣血所化而氣血必藉水穀長養倘恣嗜無忌則乳性隨之而變以此哺兒必致多病有一兒昏睡竟日不醒舉家驚惶求醫投藥罔效一高醫診之曰此兒中酒得母乳母曾痛飲乎詢之果然停藥而醒可見其利害相關明矣若氣血虛者加味四物湯或當歸補血加蔥白湯氣脈壅滯者湧泉散漏蘆散加味四物湯本門一當歸補血加蔥白湯本門二湧泉散本門三漏蘆散本門四乳汁自湧二産後乳汁自出者有胃氣虛弱不能斂攝津液者宜補胃氣以斂之有氣血大虛以致氣不衛外血不榮里而為妄泄者宜調補榮衛以止之若産婦勞役太過乳汁湧下者此陽氣虛而厥也未産乳汁自出謂之乳泣生子多不育若胃氣虛者四君子湯加黃耆氣血大虛者十全大補湯倍參耆勞役太過陽氣虛而厥者獨參湯若食少乳多欲回其乳者兔懷散若無兒食乳欲斷者麥芽煎四君子湯見産後門十三十全大補湯見月經門二四獨參湯見産後門四兔懷散本門五麥芽煎本門六乳癰三婦人乳房屬陽明乳頭屬厥陰若忽然紅腫堅硬疼痛憎寒壯熱此欲成乳癰也宜急治之當疏肝清熱兼以養血敗毒則腫硬自消否則必血滯不舒加以乳汁壅積則潰而成膿矣若初起或已成癰者消毒飲加減主之潰後氣血虛弱者人參養榮湯膿清不斂者惟十全大補湯為最消毒飲本門七人參養榮湯見月經門二二十全大補湯見月經門二四吹乳四吹乳者因乳兒之時被兒口氣所吹以致乳管不通蓄積在內遂成結核腫硬脹痛當早為消除否則久必成癰潰腐流膿則難治矣若初起之際須忍痛揉散為妙方宜瓜蔞散主之服後不散者立效散外用天南星散敷之又宜以蔥尉法尉之瓜蔞散本門八立效散本門九天南星散本門十蔥尉法本門十一乳岩五乳岩之證初起結核如圍棋子大不痛不癢五七年後或十餘年從內潰破嵌空玲瓏洞竅深陷有如山岩故名乳岩皆由抑鬱不舒或性急多怒傷損肝脾所致宜速開鬱解怒戒七情遠葷味始望有濟矣若結核初起者十六味流氣飲外以木香生地搗餅熱器尉之又以青皮甘草飲不時飲之若潰後久不愈者惟宜培補氣血如十全八珍歸脾等湯選而用之十六味流氣飲本門十二木香生地餅本門十三青皮甘草飲本門十四妬乳乳懸六乳頭生瘡謂之妬乳若兩乳細長下垂過腹者謂之乳懸乃瘀血上攻所致此證惟産後始有不概見也若乳頭主瘡者宜鹿角散敷之內服連翹散兩乳細垂者宜芎歸湯不時飲之以其餘藥薰鼻則瘀散乳即上升如不上者以萆麻仁搗貼頂心收急去之鹿角散本門十五連翹散本門十六芎歸湯見産後門五乳證門匯方加味四物湯一熟地當歸白芍川芎花粉王不留行木通上用豬蹄熬湯煎服外以蔥白煎湯時時淋洗乳房以通其氣當歸補血加蔥白湯二當歸四錢黃耆一兩蔥白五寸上銼水煎服或加白芷四五錢豬蹄湯煎服酒水煎亦效湧泉散三白丁香王不留行天花粉漏蘆殭蠶各等分上豬蹄湯煎服漏蘆散四漏蘆一兩半蛇退十條炙瓜蔞十枚急火煅存性一方用恨十個切片炒上為末每服二錢酒調下仍食豬蹄羹以助之免懷散五紅花赤芍歸尾牛膝上銼水煎服麥芽煎六麥芽三兩水煎作茶飲消毒飲七青皮白芷當歸柴胡浙貝母殭蠶天花粉金銀花甘草節各等分水煎服瓜蔞散八瓜蔞一園乳香沒藥當歸甘草各等分上為末酒煎服立效散九即前瓜蔞散加皂刺也煎服同天南星散十南星半夏殭蠶白芷皂刺草烏各等分上為細末用蔥汁合蜜調敷蔥尉法十一用連根蔥一大把搗爛成餅一指厚攤乳上用瓦罐盛灰覆蔥上須臾汗出即愈十六味流氣飲十二當歸白芍人參黃耆各二錢川芎防風蘇葉白芷枳殼桔梗各一錢甘草檳榔各五分烏藥厚朴官桂本通各八分上銼每服五錢水煎服木香生地餅十三木香二錢生地四錢上二味搗成餅置患所以熱湯器尉之青皮甘草飲十四青皮甘草各一錢上為末煎濃薑湯調眼鹿角散十五鹿角甘草各等分上為末雞子黃調銅器內炙敷之連翹散十六連翹防風元參各二錢白斂芒硝大黃射干各一錢白芍一錢升麻五分甘草五分杏仁二十粒上銼姜水煎服前陰門陰腫一婦人子戶腫脹墜痛及兩拗疼痛者謂之𤵄痃乃肝心二經火盛濕熱下注或中氣素虛下陷重墜以致憎寒壯熱小便澀滯或腹內急痛或小腹痞悶法當瀉肝熱養肝血升補中氣治無餘矣若兩拗小腹腫痛者肝經濕熱壅滯也龍膽瀉肝湯玉門腫脹者肝火盛而血虛也加味逍遙散或龍膽瀉肝湯加木香倘投以散血攻毒之劑則誤甚矣若中氣素虛下陷重墜者補中益氣湯外俱宜用騰洗之法則腫消而痛自定龍膽瀉肝湯本門一加味逍遙散見月經門十補中益氣湯見月經門四八薰洗法本門二騰尉法本門三陰痛二婦人陰中作痛名小戶嫁痛痛極往往手足不能伸舒由鬱熱傷損肝脾濕熱下注所致也治此者宜內服加味逍遙散外以四物湯料合乳香搗餅納陰中其痛即定加味逍遙散見月經門十四物乳香敷法本門四陰癢三婦人陰癢由鬱怒傷肝結滯不散濕熱蓄起因而生蟲甚則陰內癢痛不時出水肢體倦怠小水淋漓法當養血清肝則癢痛可消矣若治此者宜加味逍遙散甚則龍膽瀉肝湯外以桃仁雄黃膏納陰中其蟲一聞肝腥皆鑽於肝內吮食將肝提出此去蟲之法也蟲去其病即愈加味逍遙散見月經門十龍膽瀉肝湯本門一桃仁雄黃膏本門五陰挺四婦人陰中突出一物如蛇頭或如菌如雞冠者名曰陰挺即古之癲疝類也或因胞絡損傷或分娩用力太過或氣虛下陷或濕熱下注但此證有熱虛之辨不可不析其形腫痛小便赤數者為熱為濕其形重墜小便清長者為氣虛下陷也若屬濕熱者龍膽瀉肝湯或加味逍遙散屬氣虛下陷者補中益氣湯加青皮山梔外俱宜用蛇床洗法洗後以黎蘆敷法敷之無不愈者龍膽瀉肝湯本門一加味逍遙散見月經門十補中益氣湯見月經門四八蛇床洗法本門六藜蘆敷法本門七陰滄五婦人陰滄名曰䘌由七情鬱火傷損肝脾氣血凝滯濕熱下注久而蟲生蟲蝕成滄膿水淋漓時疼時癢有若蟲行少腹脹悶溺赤頻數食少體倦內熱哺熱經候不調赤白帶下種種證見須洋而治也若腫痛者加味四物湯潰爛出水而痛者加味逍遙散重墜者補中益氣湯加味四物湯本門八加味逍遙散見月經門十補中益氣湯見月經門四八陰痔六婦人陰中有肉突出者名曰陰痔俗稱茄子疾也流黃水者易治流白水者則難愈矣治此者宜逍遙散歸脾湯補中益氣湯量其虛實用之外宜烏頭薰法逍遙散見月經門九歸脾湯見月經門十四補中益氣湯見月經門四八烏頭薰法本門九陰冷七婦人陰冷皆由勞傷過度風寒乘虛客於子臟久之血凝氣滯多變他證且艱於受孕也治此者宜多服八味地黃丸以漸圖功外宜溫中坐藥八味地黃丸本門十溫中坐藥本門十一陰吹八婦人陰吹者陰中時時氣出有聲如穀道轉矢氣狀金匱謂由穀氣實胃氣下泄用膏發煎導病從小便而出其法甚奧若氣血大虛中氣下陷者宜十全大補湯加升麻柴胡以升提之膏發煎本門十二十全大補湯見月經門二四交接出血九婦人每交接輒出血者由傷損心脾二經也宜歸脾湯中加優龍肝或用千金桂心釜墨散歸脾湯見月經門十四桂心釜墨散本門十三前陰門匯方龍膽瀉肝湯一生地二錢木通車前子各一錢五分澤瀉黃芩各二錢當歸二錢黑梔仁龍膽草生甘草上燈心一團水煎眼薰洗法二防風三錢大戟一錢蘄艾一團上熬湯薰洗騰尉法三枳實廣皮各等分上為末炒熱騰尉之四物乳香敷法四四物湯一料乳香一錢上搗餅納陰中其痛即定桃仁雄黃膏五桃仁五錢研膏雄黃三錢末上二味研勻用雞肫肝切片蘸藥納戶中其蟲即鑽入肝而癢自止蛇床洗法六蛇床子五錢烏梅九枚上二味熬湯乘熱薰洗藜蘆敷法七藜蘆為末上用豬脂油調敷自收加味四物湯八生地當歸白芍川芎柴胡山梔炒龍膽草上銼水煎服烏頭薰法九烏頭上用釅醋熬薰自消八味地黃丸十熟地八兩九蒸山藥四兩炒山萸四兩酒蒸去核白苓三兩乳制丹皮三兩酒焙澤瀉三兩鹽水拌炒附子一兩炮肉桂一兩去粗皮煉蜜為丸桐子大每服三錢空心淡鹽湯送下忌三白溫中坐藥十一遠志乾薑吳茱萸蛇床子各等分上為末綿里納戶內一日二次換膏發煎十二婦人亂髮一團上用豬膏熬化服之小便利則愈桂心釜墨散十三桂心釜底墨各等分上二味為末酒服方寸匕雜證門熱入血室一金匱云婦人中風七八日續來寒熱發作有時經水適斷此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之此言邪熱未盡值經來乘虛入於血室之間而潛藏之故令血結而寒熱有時如瘧狀也血室肝主之肝與膽為表裡膽因肝受邪而病寒熱故用小柴胡湯主之也後人更加當歸生地丹皮者所以清血分之熱也金匱云婦人傷寒發熱經水適來晝日明瞭夜則譫語如見鬼狀此為熱入血室治之無犯胃氣及上二焦必自愈此言熱雖入子血室然經行不斷則熱不留結勿謂譫妄遂以硝黃犯其胃氣刺傷榮血小柴胡和解犯上二焦但俟其熱隨血去病必自愈傷寒論曰血自下下者愈此之謂也金匱云婦人中風發熱惡寒經水適來得六八日熱除脈遲身涼胸脅滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而取之又云陽明病下血譫語者此為熱入血室但頭汗出者當刺期門隨其實而瀉之濈然汗出者愈此二條一言適來即斷血結在裡為實證一言陽明病亦有熱入血室但下血頭汗出為不同故為熱入血室亦由肝實故均謂當刺期門也不能刺者以清熱行血湯治之合四證觀之大抵有寒熱如瘧之證方可用小柴胡湯否則或不藥自愈或刺期門而清熱行血以隨其實而瀉之此仲景心法也不得概以小柴胡治之也小柴胡湯本門一清熱行血湯本門二血分水分二婦人經水先閉後病腫者乃寒濕傷於衝任血壅經隧也名曰血分若先病腫而後經閉者乃上虛不能制水水邪泛濫溢於皮膚也名曰水分血分難治水分易愈治者詳之血分腫乃血壅不行流於四肢故令浮腫此不必治腫但調其經經通其腫自消宜小調經散加紅花丹皮牛膝水分腫乃水飲內停膀胱之氣化不行水溢皮膚故令浮腫經閉也此但宜治水水消腫退其經自通宜用茯苓導水湯或照方水泛為丸服亦可小調經散見産後門二五茯苓導水湯見胎前門十四夢與鬼交三經曰心藏神肝藏魂肺藏魄脾藏意婦人七情內傷虧損心脾意欲不遂神無所護以致魂魄不寧隨神出入故夜夢鬼交晝則獨悲獨笑宛有對忤實自身神魂為病非真有鬼邪干侵而後若是也當以養血安神為主則鬼邪不驅而消滅矣宜用歸脾湯調辰砂琥珀末服之則志定神清魂魄寧而無邪夢矣歸脾湯見月經門十四炙臠四千金方云咽中帖帖如有炙肉吐之不出吞之不下即所謂咽中如有炙臠也俗名梅核氣蓋因內傷七情外傷寒冷所致惟金匱半夏厚朴湯為治此之神劑半夏厚朴湯本門三血風瘡五婦人血風瘡證遍身起㾦㿔如丹毒狀或癢或痛搔之則成瘡由風濕血燥所致法當養血蓋血和風滅而燥為潤矣初起者宜加味逍遙散更加主地黃連如瘡結痂而愈復起白屑肌膚強硬者乃血少不潤也養榮湯主之加味逍遙散見月經門十人參養榮湯見月經門二二臁瘡六婦人憂思郁慈傷損肝脾或飲食不調損其胃氣則濕熱下注更被寒濕外侵則必兩臁生瘡外臁屬足三陽經其治易內臁屬足三陰經每多難痊不可不知初起紅腫者人參敗毒散潰後腫水淋漓者補中益氣湯哺熱者真陰虧虛也六味地黃丸食少體倦畏寒喜暖者真陽不足也八味地黃丸人參敗毒散見産後門四四補中益氣湯見月經門四八六味地黃丸見月經門二五八味地黃丸見前陰門十足跟痛七足跟乃督脈發源之地足少陰腎經徑過之所若縱欲不禁崩漏亡血虧損三陰虛熱內起以致足跟疼痛者當以填補真陰為主不得妄清其熱也治此者宜大劑六味地黃湯峻補真水若痛久不愈腫潰流膿者宜八珍湯之類大補其氣血乃克有濟也六味地黃湯見月經門十五八珍湯見月經門二三雜證門匯方小柴胡湯一柴胡三錢黃芩二錢半夏一錢五分炙草一錢人參一錢生薑三片大棗一枚上銼水煎服依本方加生地當歸丹皮尤妙清熱行血湯二桃仁一錢紅花一錢丹皮五靈脂生地各二錢甘草五分穿山甲赤芍各一錢上水煎服半夏厚朴湯三半夏厚朴蘇葉茯苓各二錢上生薑煎眼
