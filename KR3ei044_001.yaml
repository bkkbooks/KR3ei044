body:
  text: 卷一月經門醫婦之難一寇宗奭曰寧治十男子莫治一婦人謂婦人之病不易治也蓋婦人深閨幽處情多抑鬱加之憂恚憎忌慈愛多疑所願不遂性執偏拗診時又不令醫師觀形望色聞聲問因富貴之家居奧室之中處幃慢之內且復以綿帕蒙其手既不能行望色之神又不能盡切脈之巧未免詳問問之覺繁反謂醫學不精往往並藥不信不知問非易事非精於醫者必不能問也夫望聞問切四者欲去其三即神醫無由施其神矣此古今之通患牢固難破者也診婦問娠二凡診婦女須明在室適人及其夫宦遊同處與大有無妊娠一一詳問然後切脈蓋臨診之際婦女情多羞慚未免脈必不真且初妊之後每每不形於診非詳問不能知其由也倘獨恃一脈不知脈多疑似設誤觸犯咎必歸己假診室女突呼有娠不但病家憎忌而傍人謗議勢所難免故筆記於此以為醫士之鑑經脈源流三上古天真論曰女子二七天癸至任脈通太衝脈盛月事以時下故有子夫天癸者天一之氣也任沖者奇經之二也任主胞胎沖為血海氣盛脈通故月事下而有子月事者謂女子經水按月而至其盈虛消長應於月象月以三旬而一盈經以三旬而一至月月如朗不失其常故曰月經又名月信者如潮信之不爽也經病大綱四血者水穀之精氣也和調五臟灑陳六腑乃能入於脈也凡其源源而來生化於脾總統於心藏受於肝宣布於肺施泄於腎灌溉一身在男子則化而為精在婦人則上為乳汁下歸血海而為月水若情志調和精氣充暢食飲有節起居無傷則陽生陰長百脈充實何不調之有苟不知慎或六淫侵其外七情傷其中勞役損其形嗜欲耗其精一有觸犯經斯病矣調之之法惟陰陽寒熱氣血虛實八者而已縷析於下經脈異常五月經一月一至此其常也然亦有兩月一行者謂之並月有三月一行者謂之居經有一年一行者謂之避年有一生不行而能孕育者謂之暗經此皆年稟不同不須求治若經行吐衄者是渭逆經有受娠之後經復循月而産子者是謂垢胎有妊孕數月忽然下血而胎不殞者是謂漏胎此皆異乎常人均主病也治見本條察辨血色六血色之辨是以察虛實證寒熱不可不知也血者陰屬也奉心化赤故以鮮紅為正即有經病亦易治療若深紅紫黑者熱之證淺淡紅白者虛之象黃如米泔者濕之化黏如鼻涕者實之兆此其概也更當審其有無瘀塊色之明黯脈之遲數證之喜惡詳而施治庶無差誤若紫黑而明稠黏臭穢脈見浮數洪滑證候喜冷惡熱為實為熱如紫黑而黯消徹或腥脈見沉遲細弱證兼惡冷喜暖為虛為寒以此辨之最為切當學者宜深意焉經脈愆期七月經按月而至是為常候或前或後謂之愆期丹溪曰先朗而至者血熱也後則而至者血虛也王子亨曰陽太過則先期而至陰不及則後時而來觀二子之論陽盛血熱陰虧血虛致期先後理誠然矣然猶有未盡不可不察嘗見薄弱之女每每先至積想之婦恆多後朗蓋薄弱者中氣常餒脾宮失其統攝之權積想者心火時爍元海乏其源流之血又見縱欲之輩虧損肝腎衝任失守以致乍多乍少或前或後今世患經病者率由乎此誠崩漏之肇端亦剪嗣之根蒂也先期而至脈見洪數之類證兼喜冷者熱也大率血分諸病四物湯主之屬熱者芩連四物湯虛熱者地骨皮飲血多日久不止者膠艾四物湯血過多屬熱者芩術四物湯血多有塊色紫稠黏者有瘀停也桃紅四物湯隨其流以逐之血澀少色赤者乃熱盛滯血也薑芩四物湯有瘀者佛手散肝脾鬱滯者逍遙散脾經血燥者加味逍遙散若脈見濡弱沉細之類證兼喜暖為虛寒也血色淺淡乃氣虛不能攝血也當歸補血湯虛甚者聖愈湯榮衛怯弱氣血兩虧血多不止者膠艾八珍湯心脾虧損情志抑鬱以致經早其血淋瀝不止者歸脾湯最妙蓋脾統血也縱肆情欲致損肝腎衝任之源者惟當鎮固命門為主如左尺洪大無力者是真陰虛也六味地黃湯若右尺豁大無力或沉遲細澀是真陽虛也八味地黃湯過朗不至脈見沉澀者過期飲尺中脈微澀或兼腹痛者香桂四物湯色淡黃者痰濕也芎歸二陳湯紫黑有塊或成條片者熱爍血也必作痛香連四物湯過期不至尺脈微弱或澀面顏黃白無脹痛之證者乃無血可行切戒攻破之劑宜補益榮衛大壯氣血為主所謂積流而渠自通也榮衛怯弱者雙和飲人參養榮湯氣虛血虧者八珍湯十全大補湯肝經血少者六味地黃丸滋水即所以補肝也四物湯本門一芩連四物湯本門二地骨皮飲本門三膠艾四物湯本門四芩木四物湯本門五桃紅四物湯本門六薑芩四物湯本門七佛手散本門八逍遙散本門九加味逍遙散本門十當歸補血湯本門十一聖愈湯本門十二膠艾八珍湯本門十三歸脾湯本門十四六味地黃湯本門十五八味地黃湯本門十六過期飲本門十七香桂四物湯本門十八芎歸二陳湯本門十九香連四物湯本門二十雙和飲本門二一人參養榮湯本門二二八珍湯本門二三十全大補湯本門二四六味地黃丸本門二五經期腹痛八經期腹痛有前後虛實之殊不可不析實痛者多痛於未行之前經行而痛頓減虛痛者每痛於既行之後血空而痛轉加良由經前氣凝血滯不能流暢經後血虧氣弱無以充實然亦有經前屬虛經後屬實者須令以手按腹喜按喜揉者虛也拒按拒揉者實也虛實之真假凝滯之有無於此可察臨是證者詳其所因辨其虛實庶治無遺蘊矣經前腹脹痛若脹過於痛是氣滯其血也加味烏藥散右痛過於脹是血凝其氣也琥珀散若臍腹㽱痛者延歸散若臟陰冷痛者小溫經湯或因受寒過期不行少腹冷痛者大溫經湯若胞中不虛惟風寒凝結以致少腹疼痛者吳茱萸湯經後腹痛乃血虛也當歸建中湯若去血過多以致腹痛者聖愈湯十全大補湯若經行之際偶有憂鬱經遂止而腹痛者木香四物湯因怒傷肝致腹脅牽痛者逍遙散加味烏藥散本門二六琥珀散本門二七延歸散本門二八小溫經湯本門二九大溫經湯本門三十吳茱萸湯本門三一當歸建中湯本門三二聖愈湯本門十二十全大補湯本門二四木香四物湯本門三三逍遙散本門九經行發熱九經行發熱有經前經後潮熱表熱之分所當察也在經前者血熱也在經後者血虛也若經後日哺潮熱者乃真陰虧涸而然經曰陰虛生內熱法當壯水之主以制陽光若表熱者必有三陽表證可據證既屬表法當解散所渭由表而入者必表而出也若經前發熱者加味地骨皮飲經後發熱者六神湯寒熱似瘧者脾虛肝熱也逍遙散日晡潮熱者六味地黃湯若見三陽表證者則當按經解散法具後第十四經際傷寒條宜互參閲加味地骨皮飲本門三四六神湯本門三五逍遙散本門九六味地黃湯本門十五經期體痛十氣血盛實陰陽和調則形體通泰苟或外虧衛氣之充養內乏榮血之灌溉故經行而身痛也其間或有表證者法當解散設無表證形狀乃榮衛虧乏血脈壅遏而然宜調榮益衛疏經通絡俾氣充血盛經通絡達其證自已若在經行之後或因去血過多乃血虛不能榮於肢節又當從乎補矣若血脈壅滯者羌桂四物湯榮衛虧乏者八珍湯去血過多者黃耆建中湯羌桂四物湯本門三六八珍湯本門二三黃耆建中湯本門三七經行吐瀉十一胃為受谷之宰脾司運化之權二者安和則出納自如一有乖戾則受化或廢而吐瀉作矣然吐與瀉主各殊別吐出於胃瀉由乎脾也蓋經行之際脾氣輸運血海不暇滲濕固中胃中無藉健運不能化其精微此吐瀉之端由而治不可不分判者也若嘔吐涎飲者胃弱也益智六君子湯吐出食物者胃寒也香砂六君子湯若瀉者脾虛也參苓白朮散鴨溏澄徹清冷而痛乃脾寒也理中湯肌熱渴瀉者虛熱也七味白朮散益智六君湯本門三八香砂六君子湯本門三九參苓白朮散本門四十理中湯本門四一七味白朮散本門四二逆經妄行十二經期吐衄名曰逆經夫血者陰也陰從乎陽故隨氣而為升降若氣逆於上則不能循道下行或熱傷陽絡迫血從而外溢經曰天暑地熱經水沸溢蓋血泛濫多由乎熱也治官抑氣清熱則經水安瀾而無沸溢之患矣若經前吐血衄血者乃熱壅迫其血也三黃四物湯氣逆載血者以抑氣清熱為主抑氣涼血飲若在經後其熱已減宜犀角地黃湯熱或甚者芩連犀角地黃湯若脈沉弱或細者惟以清補為主生地六味湯少加童便沖服三黃四物湯本門四三抑氣涼血飲本門四四犀角地黃湯本門四五芩連犀角地黃湯本門四六生地六味湯本門四七經行帶下十三帶下一證有赤白之分赤由濕熱之腐化白屬氣虛之陷下蓋經將行時氣輸血海倘素涉中虛或宿有濕熱故隨氣流下溷淆其間若形清腥穢又為寒虛所化間白帶多於經後名曰脫陽法當大補否則禍不旋踵矣若色白者氣虛陷下不能固攝也補中益氣湯色赤者濕瘀熱化也知柏四物湯白帶多於經後者十全大補湯補中益氣湯本門四八知柏四物湯方見崩漏門一十全大補湯本門二四經際傷寒十四經行之際不謹調攝因而偶感外邪須明風寒之辨苦頭痛汗出嗇嗇惡寒翕翕發熱鼻鳴乾嘔者此風邪中太陽衛分也若頭疼脊強身痛無汗惡寒者此寒邪傷太陽榮分也上二證者以有無汗出為風寒之確辨咸宜速除者也稍涉延蔓則必傳入陽明之表而見惡熱汗出目痛鼻乾不眠等證再或不愈因見寒熱往來嘔而口苦咽乾目眩此邪已傳少陽也倘日晡潮熱自汗喜飲腹滿惡熱舌胎蒼黃邪已傳陽明胃府不復傳也若風傷太陽衛分者桂枝四物湯寒傷太陽榮分者麻黃四物湯邪傳陽明之經者葛根四物湯邪入少陽者柴胡四物湯邪傳陽明胃府者玉燭散桂枝四物湯本門四九麻黃四物湯本門五十葛根四物湯本門五一柴胡四物湯本門五二玉燭散本門五三月經門匯方四物湯一熟地二錢當歸二錢酒炒白芍二錢酒炒川芎一錢上為粗末水煎溫服如血熱者以生地易熟地煎眼照前芩連四物湯二生地三錢酒炒當歸二錢酒炒白芍二錢灑炒川芎一錢黃芩一錢酒炒黃連一錢酒炒水煎溫服地骨皮飲三生地酒炒當歸各二錢酒洗白芍一錢酒炒川芎八分丹皮地骨皮各二錢水煎微溫服膠艾四物湯四熟地三錢當歸二錢酒洗白芍二錢酒炒川芎錢五分阿膠蛤粉炒珠艾葉各一錢醋炒黑炙草五分水酒煎空心溫服芩術四物湯五生地三錢當歸二錢酒洗白芍二錢酒炒川芎一錢黃芩二錢酒炒白朮錢五分土炒水煎溫服桃紅四物湯六生地三錢酒洗當歸四錢酒洗白芍錢五分酒炒川芎一錢桃仁十四粒去皮尖研泥紅花一錢酒洗水煎溫服薑芩四物湯七當歸酒洗熟地赤芍酒炒川芎薑黃黃芩丹皮元胡酒炒香附各等分酒炒水煎溫服佛手散八川芎二兩當歸三兩上為細末每服二錢水一盞灑二分煎七分溫服逍遙散九白朮二錢土炒茯苓一錢當歸二錢酒洗白芍二錢酒炒柴胡八分炙草六分南薄荷三分加薑棗水煎溫服加味逍遙散十即前方加山梔丹皮各一錢當歸補血湯十一當歸三錢酒洗黃耆一兩蜜炙上水煎服聖愈湯十二熟地四錢當歸二錢酒洗白芍二錢酒炒川芎一錢黃耆二錢蜜炙人參一錢上水煎服膠艾八珍湯十三人參一錢或二錢去蘆另煎沖白朮二錢土炒茯苓一錢炙草八分熟地三錢當歸二錢酒洗白芍二錢酒炒川芎一錢阿膠一錢蛤粉炒艾葉一錢醋炙加薑棗水煎溫眼歸脾湯十四人參一錢余白朮二錢土炒黃耆二錢蜜炙白苓一錢當歸錢五分酒洗棗仁二錢炒研遠志六分炙草八分木香三分末調龍眼肉一錢加薑棗水溫煎服六味地黃湯十五熟地四錢山藥二錢炒山茱萸二錢酒