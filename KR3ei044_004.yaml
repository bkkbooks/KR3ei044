body:
  text: 卷四嗣育門胎孕之原一經曰丈夫二人腎氣盛天癸至精氣溢瀉陰陽和故能有子女子二七天癸至任脈通太衝脈盛月事以時下故有子天癸者天一之真氣也蘊藏於命門之中男必待二八腎氣盛女必待二七任脈通故精氣溢瀉月以時下與後天水穀日生之精混合而盈陰陽和乃能有子然男屬陽陽應日故精盛而日舉女屬陰陰應月故血盛而月下男女交媾其先後天之精氣妙合而凝始能成孕當是之時陽盛成男陰盛成女先哲有云乾道成男坤道成女理所然也不孕之故二婦人纖疴不作始能有子若為三因之邪傷其衝任二脈則月經不調赤白帶下崩經漏血諸病生焉或宿血積於胞中以致新血不行或胞寒胞熱不能攝精或體盛痰多脂膜壅塞子宮諸如此類皆不孕之故也當細審其因按證調治俾無疾作乃可望其麟趾呈祥矣然其男子有無疾病亦所當察設有腎虛精滑精冷精清或臨事不堅流而不射盜汗夢遺便濁淋澀等類欲望其苗而秀秀而實者未之有也男女完實三男子十六而精通必待三十而娶女子十四而經至必俟二十而嫁所以然者皆欲陰陽完實然後交而孕孕而育育而其子必堅壯長壽也今未笄之女天癸始至已近男色則陰氣早瀉未完而傷未實而動所以雖交而不孕孕而不育育而其子必脆弱不壽矣為人父母者不可以不知此種子時候四聚精之道惟在寡欲交接女子必乘其時蓋婦人一月經行一度之後必有一日氤氳之時氣蒸而熱如醉如癡有欲交不可忍之狀乃天然節候是成胎生化之真機志欲種玉者慎勿失此機也論成男女五成男女之說著論紛紛先賢有以血先至里精則成男精先至里血則成女精血散分並里則為駢胎品胎之原者有以月水盡後一三五日成男二四六日成女與夫經水斷後一二日成男四五日成女者有以受氣於左子宮成男受氣於右子宮成女者皆各執一見殊為謬誕蓋獨男獨女之胎或可以日數論駢胎品胎或男或女亦可以日數論乎稽之史載一産三子四子有半男半女或男多女少男少女多者則一三五日為男二四六日為女之說不可憑矣抑豈有一日受男而二日復受女之理乎胞命門也在男子曰精室在女子曰子宮形如合鉢並無兩岐可分曰左右則是有兩子宮矣此說尤屬不經然則何以定之亦惟以會合天人陽盛乾道成男陰盛坤道成女斯足為的確不易之論耳雙胎品胎六古以雙胎乃精氣有餘岐而分之血因分而攝之故也若男同孕者剛日陽時也女同孕者柔日陰時也男女同孕者剛日陰時或柔日陽時也其他或有不成男女男不可為父女不可為母與男女之兼形者又皆陰陽變常駁氣所感事之所有理之所無莫可稽考者也脈知有子七經曰婦人手少陰脈動甚者妊子也少陰者心也動者滑利不散之義乃血液斂結之象經又曰陰搏陽別謂之有子陰謂尺中陽謂寸上蓋女子系胞於腎乃孕胎之根蒂搏者搏擊之謂若兩尺搏指久按不歇與兩寸迥然相別皆有子之診也其脈滑疾不散胎必三月但疾不散五月孕母至此男女形質已具預知之法須憑兩尺左尺沉實為男右尺浮大為女蓋沉實者陽內之象浮大者陰中之體也以此察之最為確當及八九月後血氣流散脈則和平宛若無孕非醫者深明脈理病家肯言其故難以一診而知也男女胎形八胞孕男女向背不同娠母腹形迥然各異蓋男胎面向母背則背脊抵腹其形中正高圓如釜之狀女胎面向母腹其足膝抵腹下大上小如箕之形故曰男腹如釜女腹如箕其動男每在三五月女多在四六月此定以奇偶之數理有然也孕病辨疑九婦人經水不來孕病恍惚者於五月之後驗之以乳若乳房升大且有乳者孕也設不升大更兼無乳病也以此辨之足為捷徑辨分經養胎十觀巢元方曰妊娠一月名胚胎足厥陰脈養之二月名曰始膏足少陽脈養之三月名始胎手心主脈養之當此時血不流行形象始化四月始受水精以成血脈手少陽脈養之五月始受火精以成氣足太陰脈養之六月始受金精以成筋足陽明脈著之七月始受木精以成骨手太陰脈養之八月始受土精以成膚革手陽明脈養之九月始受石精以成毛髮足少陰脈養之十月足太陽脈養之五藏六府關節人神畢備而生矣凡胎受於胞中則手足十二經脈其氣血晝夜周流俱以擁養胎元豈有逐月分經某月某經養之之理乎又有推巢氏養胎之說謂四時之令必始於春所以一月二月間是足厥陰少陽木也三月四月間手厥陰少陽火也五月六月間足太陰陽明土也七月八月間手太陰陽明金也九月十月間足少陰太陽水也惟手少陰太陽二經無所專養者以君主之官無為而已此說更為不經夫胎稟二五之精凝聚而成胚此孕形之肇也雖身軀臟府未分而其理無一不具猶太極渾然包羅萬象而陰陽之一氣氤氳浸漸化生而成子母分形自然而然如瓜果成熟殼脫蒂落也分房靜養十一妊娠之後須分房靜養恐動相火致生胎毒也宜謹戒飲食慎節厚味使脾胃調和母之氣血易生則子之形成必育更內調七情外避風寒勿持重勿過勞勿安逸多睡勿登高涉險務起居安順則母無病而子亦安矣安胎母子二法十二胎氣不安有母子二因詳因施治乃其善也若因母有他病以致胎動者但療其母母安則胎自安或因胎有所觸動以致母病者惟直安胎胎安而母自愈矣胎前用藥三禁十三丹溪曰胎前當清熱養血為主恐傷陰血也理脾疏氣為要脾健則氣血易生氣順則氣血調和理脾疏氣兼以清熱養血則胎自安矣三禁者汗下利小便也蓋恐過汗亡陽以傷氣過下亡陰而傷血利小便傷其津液也然又當詳審表裡虛實而冶之惟不可過峻為要也安胎用藥審宜十四朱丹溪曰白木黃芩為安胎聖藥俗醫謂溫劑可以養胎不知胎前最宜清熱令血循經下行故能養胎如鍾懸在梁梁軟則鍾墜白朮益脾以培萬物之母條芩瀉火能滋子戶之陰興其利而除其害其胎自安故黃芩安胎為上中二焦藥趙養葵曰胎莖系干腎猶鍾繫於梁棟柱不固其梁必撓所以安胎先固兩腎使腎中和暖始脾有生氣何必以白朮黃芩為安胎耶所用之方六味八味玩二公創論各執一偏有不可以概胎前諸證者夫人稟賦強弱不一氣血虛實各異即其疾病不無寒熱之殊且胎前用藥最貴審宜設一不當必致墮隕欲知其要惟氣血寒熱而已如脾虛有熱丹溪之法為宜腎乏水火趙氏之用甚善至血虛腹痛者非歸芍養之不除氣虛下墜者必參耆舉之始安觸犯腰痠者固之務需杜續胎迫胸滿者開之須藉腹蘇總之誠能參合脈證酌其適宜何施不可即半夏烏附肉桂大黃先哲每用安胎未嘗墮隕第須洋其寒熱乃為善耳經曰婦人重身毒之何如有故無隕亦無隕也其斯之謂歟嗣育門備用匯方加味地黃丸一治婦人經水不調必不能受孕即使受之亦不全美宜常服此方熟地四兩山萸肉山藥各二兩炒牡丹皮灑蒸白苓一兩五錢乳制建澤瀉切鹽水浸炒香附童便浸三次各一兩上為末煉蜜丸如桐子大每服七十丸白沸湯送下滌痰湯二又名植芝湯治婦人胞盛者多不受孕以身中有脂膜閉塞子宮也以此湯送服後滌痰丸當歸一兩茯苓四兩川芎七錢五分白芍藥白朮半夏薑製香附米陳皮甘草各一兩上作十貼姜三片水煎吞後丸子滌痰丸三又名茂芝丸白朮二兩土炒半夏曲川芎香附米各一兩神麯炒茯苓各五錢橘紅四錢甘草二錢上為末粥丸每服八十丸如熱者加黃連枳實各一兩大補丸四治婦人瘦弱多由血少不能受孕宜常服此方天冬去心麥冬去心菖蒲茯苓人參益智仁枸杞地骨皮遠志肉上為細末煉蜜為丸如桐子大空心酒下三十丸蓯蓉菟絲子丸五肉蓯蓉一兩三錢覆盆子蛇床子川芎當歸菟絲子各一兩二錢白芍一兩牡蠣鹽泥固煅烏賊魚骨各八錢五味子防風六錢條芩五錢艾葉三錢上為末煉蜜丸如恫子大每服三四十丸鹽湯下早晚皆可服調經丸六理氣養血調經種子香附四制杜仲各八兩薑汁炒大川芎白芍藥當歸去尾懷生地陳皮小茴香酒炒延胡索略炒肉蓯蓉酒炒舊青皮麩炒臺馬藥炒枯黃芩酒炒烏賊魚骨醋炙以上各四兩上十四味稱足真正好醋和麵打糊為丸如桐子大每服百丸空心好酒送下一方無陳皮地黃有人參黃耆各二兩經驗育胎丸七治婦人久無子嗣服此經調血盛子宮溫暖成孕孕後服之可保胎氣堅固當歸酒洗熟地白朮土炒香附各四兩四制砂仁三兩炒白芍酒炒川芎續斷酒洗陳皮黃芩各二兩酒炒上為細末糯米糊丸如桐子大每服七八十丸空心淡醋湯下酒亦可以乾物壓之艾附暖宮丸八治婦人子宮虛冷帶下白淫面色痿黃四肢疼痛倦怠無力飲食減少經脈不調血無顏色肚腹時痛久無子息服此藥須戒惱怒忌生冷纍甲經驗香附子六兩用醋五升以砂石罐煮一晝夜搗爛成餅慢火焙乾艾葉去梗川芎各三兩酒洗吳茱萸去梗鹽制黃耆白芍各二兩酒炒續斷一兩五錢去蘆生地黃一兩酒洗官桂五錢上為細末用好醋打糊為丸如桐子大每服五七十丸淡醋湯食遠下擇壬子日或天德月德日修合驗胎散九婦人兩三個月月經不行疑是兩身卻疑血滯心煩寒熱恍惚此藥可驗真雀腦芎一兩全當歸重一兩者只用七錢上二味為細末分作二服濃煎燈艾湯一盞調下或好酒調服待三兩個時辰間覺臍腹微動仍頻即有胎也動罷即愈安穩無虞如不是盼即不動所滯惡物自行母亦安也如服藥不覺效再煎紅花湯調下必有效應女金丹十一名勝金丸治婦人久虛或産後頭調觸犯禁忌斷産少子及經事遲來赤白帶下腰腳重痛寒熱不一身體瘦削眩暈嘔逆此藥善調經候每日一九若胎前二日一丸産後二日一丸一切雜證效難具述珍之寶之香附十五兩醋浸三日當歸川芎白芍人參白朮白苓甘草桂心白薇延胡索牡丹皮藁本白芷沒藥另研赤石脂各一兩另研上除香附沒藥石脂餘十三味用好酒浸三日曬乾同香附為末方入沒藥石脂煉蜜為丸如彈子大每服一丸五更初嚼碎溫酒送下白湯亦可此藥多在四十九丸後以癸水調平受孕為度倘有孕依前三日一服無所忌戒一方去沒藥加沉香一方去桂心加熟地黃丸如桐子大每服五十丸空心溫酒或白湯下以乾物壓之
