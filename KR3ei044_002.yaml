body:
  text: 卷二經閉門血滯經閉一水脹篇曰石瘕生於胞中寒氣客於子門子門閉塞氣不得通惡血當瀉不瀉衃以留止日以益大狀如懷子月事不以時下皆生於女子可導而下夫胞者子宮也子門者胞之門也氣血交通月以時下或寒邪外干或瘀血內壅氣不宣通血因遏阻以當瀉者不能得瀉衃血凝塞胞中狀如懷子若不早為祛除則必日以益大其堅如石故曰石瘕寒邪既從下襲溫導奚容寬緩務期衃留去而元氣無傷斯為用導之善者矣評熱病論曰月事不來者胞脈閉也胞脈者屬心而絡於胞中今氣上迫肺心氣不得下通故月事不來也蓋相火居於胞中心火主乎血脈陽氣上下交通陰血隨其灌注何有不來之虞第婦人心氣恆郁欲火時萌火之發也刑乎金金之燥也氣上衝欲不咳嗽勢不能已愈咳則氣愈上致乏下絡之權故月事斷絶矣夫病由心生亟宜速治否則咳嗽日久必增息賁而成肺勞矣潔古曰宜先服降心火之劑後蕎脾血余佩而用之每奏捷功先哲之言信非誣也若外邪客犯致成石瘕者宜吳茱萸湯溫而散之裡氣壅瘀而成者宜琥珀散以攻導之氣上迫肺月事不來者先宜三和湯後服五補丸及衛生湯吳茱萸湯見月經門三一琥珀散見月經門二七三和湯本門一五補丸本門二衛生湯本門三血虧經閉二陰陽別論曰二陽之病發心脾有不得隱曲女子不月其傳為風消其傳為息賁者死不治夫二陽者足陽明胃也從生於心藉化於脾二者安和則胃納水穀而化精微倘女子有隱情曲意不得舒衷暢懷則心脾氣鬱不行胃乏生化飲食日少血何由生所謂二陽之病發心脾女子不月矣能使心脾和暢胃職乃司中焦受氣取汁變化而赤庶血海日盛經斯復下矣苟或遷延陰血愈虛內熱愈熾肌為熱爍如風消物皮膚甲錯日漸瘦枯名曰風消火之化也火盛無制必刑肺金金氣受邪不能運布水精留於胸中津液悉凝為痰咳嗽晝夜難已腎失水源因而氣上不歸息賁促急肝無水滋毫毛焦枯鬢髮脫落五臟遍傳欲望有生焉可得耶若因胃熱爍血血海乾枯者玉燭散泄其熱則經自行心脾氣鬱者歸脾湯氣血虧衰者人參養榮湯咳嗽氣急者此金水不能相滋也麥味地黃湯肝失水榮者六味地黃湯諸所示盡詳血枯經閉宜互參考玉燭散見月經門五三歸脾湯見月經門十四人參養榮湯見月經門二二麥味地黃湯本門四六味地黃湯見月經門十五血枯經閉三血枯經閉一證其因多端有不可一途論治者夫枯者涸竭之謂也原其所致之由或思慮而傷心脾或縱欲而損肝腎或崩漏吐衄而陰血暴亡或産多乳衆而衝任漸涸蓋思慮抑鬱則心脾氣滯不行因而胃廢出納之用縱欲過極則肝腎真精日損以致筋骨無藉滋榮崩漏吐衄隧道乏其灌注産多乳衆血海無以充盈故月事斷絶面爪黃白肢體困倦午後潮熱種種見證靡非精血虧竭之候名曰虛損於是最當滋補肝腎培養脾胃蓋胃者衛之源脾者榮之本俾氣血充足經脈貫通斯太衝漸盛月當自下矣舍此不治久必陰水愈耗陽火愈熾火上爍肺致使頻咳喘促繼而骨蒸勞熱面色枯白顴若塗朱肌膚甲錯甚為寒熱迭變諸證皆由真陰枯涸元陽飛越變為壯火勢與元氣不兩立戕賊氣血難遏難止經曰壯火食氣氣亦弱矣此勞瘵中最危最惡之候也惟宜壯水之主以制陽光或可冀其萬一倘妄肆寒涼危亡立待醫不識此安望有濟於他哉若因思慮傷脾者歸脾湯飲食懶思時或多痰者六君子湯縱欲過極以致肝腎精血虧損者歸芍地黃湯所謂乙癸同源也崩漏吐衄産多乳衆血無以生者人參養榮湯十全大補湯八珍湯午後潮熱者地骨皮飲六味地黃湯咳嗽成勞頻頻不已者劫勞散咳而喘促者此腎虛不能納氣歸源也麥味地黃湯參麥地黃湯加味都氣湯此納氣藏元之治也骨蒸勞熱或多盜汗者地龜都氣湯身發壯熱時或乾渴者此真陰涸竭元陽飛越也法當壯水制陽為主如六味地黃湯加龜膠青蒿之類如寒熱似瘧者此氣血大虛之候也惟宜培補如十全大補湯加薑炭柴胡之類若咳嗽初起須審其因如由外邪當從疏解倘驟用補則邪必留連久而成勞經曰勞風發於肺下正謂此也歸脾湯見月經門十四六君子湯本門五歸芍地黃湯本門六人參養榮湯見月經門二二十全大補湯見月經門二四八珍湯見月經門二三地骨皮飲見月經門三六味地黃湯見月經門十五劫勞散本門七麥味地黃湯本門四參麥地黃湯本門八加味都氣湯本門九地龜都氣湯本門十師尼室寡經閉四夫師道姑也尼女僧也室系尚未適人之女寡乃少而亡夫之婦凡此經閉者不可同尋常妻妾論治也蓋寂居深幽獨陰無陽情志恆多鬱結欲念時萌弗遂欲察其驗肝脈弦出寸口其故何也由相火寄權於肝也抑其夫宦遊客處者每患斯疾業是科者先須識此明乎此則情志錯雜難名之狀洞徹無餘調治之法和肝理脾開鬱清心而已然更須病者自移心志始能寧弭蕭牆之禍矣室女多屬氣血凝結者法當攻破大黃䗪蟲丸體弱脈虛難任攻下者澤蘭葉湯柏子仁丸兼服久之其血自行師尼寡婦多屬鬱熱宜金蘭逍遙散以和肝理脾開鬱清心經自通也大黃䗪蟲丸本門十一澤蘭葉湯本門十二柏子仁丸本門十三金蘭逍遙丸本門十四婦人經斷復來五婦人七七天癸竭地道不通當月水不下倘仍不斷別無他證乃血有餘不可用藥強止若斷已年餘之外忽爾夏來者當審其因果何干犯隨證施冶無不可也若因血熱者芩心丸血熱甚者益陰煎血去過多衝任虛損不能固其血者十全大補湯或膠艾八珍湯怒氣傷肝致血不藏者逍遙散憂思傷脾不能統攝者歸脾湯苓心丸本門十五益陰煎本門十六十全大補湯見月經門二四膠艾八珍湯見月經門十三逍遙散見月經門九歸脾湯見月經門十四室女經來復止六女子二七天癸至經行數度仍復不來無他疾苦必是避年蓋緣氣血尚弱經隧未充當俟自下不必求療倘兼虛損形證緊數之脈則為室女血枯經閉名曰重癆命屬風燭斷非享齡之兆寇宗奭曰夫人之生以氣血為本人至有病未有不先傷氣血者世有童男室女積想在心思慮過度多致勞損男子則神色先散女子則月水先閉蓋憂愁思慮則傷心心傷則血逆竭血逆竭則神色先散而月水先閉也火既受病則不能榮養子故不嗜食脾氣虛則金氣虧故發嗽嗽既作則水絶故四肢干木氣不暢故多怒鬢髮焦筋骨痿五藏傳遏而終死矣此付癆瘵最難治蓋病起於五臟之中藥力所不可及也若能改易心志甲藥善於調理或得九死一生耳法詳血枯及室寡經閉茲不冗贅經閉門匯方三和湯一當歸川芎白芍生地大黃朴硝黃芩山梔連翹薄荷甘草各等分上銼每八錢水煎服五補丸二熟地人參牛膝酒焙白苓地骨皮各等分上為末煉蜜丸桐子大每服三五十丸空心溫酒送下衛生湯三當歸二兩酒洗白芍二兩酒炒黃耆三兩蜜炙甘草一兩上為末每服半兩水二盞煎一盞空心溫服如氣虛者加人參一兩麥味地黃湯四熟地四錢山藥炒山萸各二錢酒蒸去核白苓丹皮酒焙澤瀉各一錢五分鹽水拌炒麥冬二錢去心五味八分蜜制水煎空心溫服六君子湯五人參一錢白朮二錢土炒白苓錢五分半夏二錢薑製橘皮一錢炙草八分加薑棗水煎食後溫服歸芍地黃湯六熟地四錢山藥炒山萸各二錢酒蒸去核白苓丹皮澤瀉各錢五分鹽水浸炒當歸二錢酒洗白芍錢五分酒炒水煎空心溫服右尺脈微者加肉桂一錢劫勞散七白芍六兩酒炒黃耆四兩蜜炙甘草蜜炙人參去蘆當歸酒洗熟地焙乾五味真阿膠各一兩蛤粉炒珠上為粗末每服三錢水一盞生薑七月棗三枚煎至九分溫服參麥地黃湯八熟地五六七錢山藥炒黃山萸各二錢酒蒸去核白苓丹皮酒焙澤瀉各錢五分鹽水拌炒麥冬三錢去心五味八分蜜炙人參一二錢另煎衝入水煎早晚溫服加味都氣湯九熟地自四錢至七八錢山藥炒黃山萸各二錢酒蒸去核白苓丹皮各錢五分酒焙澤瀉一錢鹽水拌炒川牛膝錢五分酒焙麥冬二三錢去心遼五味七八分至一錢蜜炙肉桂一錢右尺沉而有力者去之黑沉香三五分末調入水煎空心溫服地龜都氣湯十熟地四錢山藥二錢炒黃山萸二錢酒蒸去核白苓丹皮灑洗澤瀉各一錢五分鹽水拌炒龜板一枚醋炙地骨皮一錢去骨五味一錢水煎溫服尺脈洪大者加生地二錢丹皮加至二錢肝脈浮弦者加生白芍二錢大黃䗪蟲丸十一大黃酒蒸赤芍酒炒生地酒洗桃仁去皮尖杏仁去皮乾漆炒去煙黃芩甘草䗪蟲虻蟲蛭蟲蚜螬各等分煉蜜丸每服丸數量虛實增減澤蘭葉湯十二澤蘭葉三兩當歸酒洗白芍藥各一兩酒炒甘草五錢上為粗末每服五錢水二盞煎一盞溫服柏子仁丸十三柏子仁炒另研牛膝酒洗卷柏各五錢澤蘭葉續斷各二兩熟地三兩五錢酒浸透石曰內杵成膏上為細末煉蜜丸桐子大空心米飲送下三十丸金蘭逍遙散十四當歸酒洗白芍酒炒白木土炒茯苓柴胡炙草香附醋炙生地酒洗黃芩酒炒薄荷鬱金譯加薑棗水煎溫服芩心丸十五用黃芩心枝條者三兩米泔浸七日炙乾又浸又炙如此七次上為末醋丸如桐子大每服七十丸空心溫酒送下日進二服益陰煎十六生地三錢知母二錢酒炒黃柏二錢灑炒龜板四錢醋炙縮砂仁甘草各一錢炙崩漏門崩經漏血一經曰心生血肝藏血脾統血夫血者陰也隨氣而為升降升降調適則月事下止依時苟有戾乖斯崩或漏矣崩者血卒大下若山崩難遏之勢漏乃不時淋漓綿綿弗已之謂致此之由或思慮傷脾中氣困餒則不能統攝歸源忿恚傷肝火動於中迫血無藏納之所悲哀太過心胞系損因而血乏主宰房欲不謹腎命日虧以致閉藏失權此皆犯其臟者也更或向有瘀停因新血沖激而始泄或熱傷陰結為火搏擊而妄行治療之法在乎詳審若果有瘀有火清之逐之為宜倘涉虛候當從升補不得肆用寒涼攻克反伐生氣之源為害匪細經曰血脫益氣東垣云大夫血後須用四君輩以收功可謂得經旨之奧矣若崩漏去血過多者膠艾四物湯止之血熱者知柏四物湯清之熱微者荊芩四物湯和之漏血澀少間有淤塊者桃紅四物湯加香附破之崩血初起腹脅脹痛色紫成塊者屬瘀凝也琥珀散攻之崩漏日久去血過多而氣隨血去衝任損傷因見肢體倦怠脈息沉弱細濡之類大虛之候當恃溫補宜膠艾八珍湯人參養榮湯十全大補湯尺脈微加附子若色黑如豆汁清稀者此敗血也尤宜前藥思慮勞倦致脾不能統血歸源者歸脾湯脾經鬱火者加味歸脾湯忿恚傷肝者逍遙散加香附青皮怒動肝火者加味逍遙散房勞傷腎以致衝任失守當鎮固命門為主左尺脈細弱者六味地黃湯加續斷阿膠右尺脈微細者八味地黃湯不可以肉桂動血執泥此余屢用屢驗者崩血已多其色紫黯清稀腹痛無時者姜附芎歸湯悲哀太過者補中益氣湯或日久脾傷食少中氣下陷不能載血者亦宜是方中氣不固不能提攝者益胃升陽湯崩漏夾水或日水瀉一二次形氣不甚弱者調經升陽除濕湯以風先勝其濕然後補益中州形氣虛弱者補中益氣湯加風藥一二味如防風桂枝之屬補中以勝濕也崩血補之仍然不止者須防滑脫宜地榆苦酒煎以止之止後隨證施治可也膠艾四物湯見月經門四知柏四物湯本門一荊芩四物湯本門二桃紅四物湯見月經門六琥珀散見月經門二七膠艾八珍湯見月經門十三人參養榮湯見月經門二二十全大補湯見月經門二四歸脾湯見月經門十四加味歸脾湯本門三逍遙散見月經門九加味追遙散見月經門十六味地黃湯見月經門十五八味地黃湯見月經門十六姜附芎歸湯本門四補中益氣湯見月經門四八益胃升陽湯本門五調經升陽除濕湯本門六地榆苦酒煎本門七殺血心痛二崩血而心痛甚者名曰殺血心痛由亡血過多心脾無所榮養間有淤血凝結不散者必有形跡可徵若因小産去血太甚以致心痛者緣由雖二其致一也若因血滯不散者失笑散先定其痛後隨證施治如因去血過多歸脾湯人參養榮湯十全大補湯等乃治此之神劑失笑散本門八歸脾湯見月經門十四人參養榮湯見月經門二二十全大補湯見月經門二四崩漏門匯方知柏四物湯一生地四錢酒洗當歸頭錢五分白芍三錢酒炒川芎錢五分知母酒炒黃柏各一錢酒炒水煎溫服荊芩四物湯二生地三錢酒洗當歸酒洗白芍各二錢酒炒川芎荊芥黃芩酒炒香附各一錢醋炙水煎溫服加味歸脾湯三人參一二錢去蘆白朮二錢土炒茯苓一錢黃耆二錢蜜炙棗仁二錢炒遠志六分甘草水浸去骨炒當歸錢五分木香三分炙草八分龍眼肉一錢柴胡五分山梔子一錢丹皮一錢加薑棗水煎食遠溫服姜附芎歸湯四當歸四五錢酒洗川芎二錢薑炭錢五分附子錢五分炮水煎溫服益胃升陽湯五黃耆二錢蜜炙人參一錢白朮三錢土炒神麯錢五分炒當歸酒洗陳皮炙草各一錢升麻柴胡各五分生黃芩二錢上為粗末每服三錢或五錢如食添再加之如食減只服三錢或減之不可多服水煎去滓熱服熱者用黃芩寒者減芩加肉桂一錢腹痛加白芍有嗽去人參調經升陽除濕湯六黃耆蒼朮羌活各錢五分防風藁本升麻柴胡炙草各一錢獨活五分蔓荊子七分水五盞煎一盞去滓稍熱服空心服畢待少時以蚤膳壓之地榆苦酒煎七地榆一兩炒醋煎露一宿次早溫眼立止止後隨證調治之苦酒即醋也失笑散八五靈脂蒲黃各等分上為末先用釅醋調二錢熬膏入水一盞煎至七分食前熱服良驗
