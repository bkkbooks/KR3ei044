body:
  text: 序昔子輿氏有言夫道若大跖然豈難知哉是故六經之言道如天地之無所不包四子之言道如日月之無所不燭不獨大道為然醫雖小道亦道之一事究其綱領條目經常變化上關運氣下切恫而寄生命與大道無兩樞軸也華性懦愚讀書無成其於大道如在夢寐中耳少年患溫幾為醫誤於是棄儒業醫酷嗜岐黃家言潛心數載似少有得然猶不敢自信竊見泥古而執成規者不反復致詳而簡略從事經目而未必經心過而不入此又難之難矣夫太極判而天地分天地位而萬物育生生化化不外於陰陽相濟而成然先儒嘗言寧治十男子不治一婦人蓋謂男子以氣為本而婦人以血為主氣固不易理而血尤難調燮也故兢兢業業苦攻多年傷寒方脈未敢稍為憚煩而於婦科特究心焉及循考群書率多論而不詳語而不暢或存論而遺脈或有治而無方使留心斯道者非失遺珠之恨即生望洋之嘆愛不揣固陋編輯是書門分十二帙集八卷理本靈素奧旨法述先哲精言略者詳之冗者刪之遺者補之缺者增之雖不敢自以為是私心竊願醫之為術廓如天地照如日月由道之一端悟道之全體不捨易以求難精進勉研以冀大方海我時乾隆四十一年歲次丙申孟春上浣後學柴得華麗東氏書於酒泉之育齡齋
