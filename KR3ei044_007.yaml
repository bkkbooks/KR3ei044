body:
  text: 卷七産後門胞衣不下一胞衣不下其因有四或風冷干犯因使振血凝滯或下血過多以致産路澀干或惡血流入胞內衣漸脹滿而疼痛或産久氣弱困怠無力運托而外行夫兒身既離胞宜速下不爾上攻心胸脹滿喘急將有性命之憂者矣治此之法急宜奪命散以解其危或生化湯大加肉桂使血和則易下也一法用蔥一莖捲於産婦發內令口嚼之俟嘔可即下也奪命散本門一生化湯本門二玉門不閉二既産玉門不閉者其致有二或氣血衰弱或初産傷重氣血衰弱者無所痛苦因産傷重者必腫而痛也若氣血衰弱不能收閉者十全大補湯因初産傷重者甘草煎湯淋洗之其腫自平十全大補湯見月經門二四血暈三産後眼生黑花頭目旋暈不能起坐昏迷不省人事者謂之血暈由惡露去少敗血流入於肝乘虛逆湊於心神明被擾故昏不省人氣閉欲絶也然因去血過多心神失養者亦能致此名曰血脫倘作血暈施治必增危劇二者何以辨之面唇色赤者血暈也面唇色白者血脫也辨認不明鮮不誤矣若血暈者佛手散童便沖服血脫而致者清魂散二者均宜燒下漆及燒鐵釘醋淬不時熏鼻自蘇若向有血暈之患者宜於臨産之時預服獨參湯或十全大補湯一二劑不但可免血暈而且易産此屢試屢驗法也清魂散本門三獨參湯本門四十全大補湯見月經門二四惡露不下四惡露不下有因風冷襲干胞門以致氣滯血凝腹中必有脹痛之虞有因産時去血太多血海乾澀面顏必見黃白之色以此辨之誠切當不易法也若因血凝者失笑散逐而行之去血大多者聖愈湯補而運之失笑散見崩漏門八聖愈湯見月經門十二惡露不絶五産後惡露乃里兒汙血也産時當隨胎而下其未盡之餘常以七朝為率若日久不斷時時淋漓者有衝任虛損不能收攝有瘀停米盡隨化隨行當審其色或汙濁不明或淺淡不鮮或其氣臭或腥而穢是汙濁不明為虛中挾滯淺淡不鮮為衝任虧弱其氣臭腥而穢者財為瘀停不盡也若衝任虛損不能攝血者十全大補湯加續斷阿膠色汙濁不明者人參養榮湯色淺淡者八珍湯其氣臭腥而穢隨化隨行倆停所致也佛手散加益母草十全大補湯見月經門二四人參養榮湯見月經門二二八珍湯見月經門二三佛手散見月經門八頭疼六頭者諸陽之會也産後五臟皆虛陰血暴亡孤陽失守上湊於頭而痛誠陰虛所致也面色必黃白脈則寸強尺弱間有敗血攻衝而疼者必兼腹痛之證治者詳之若去血太多者此血虛頭疼也八珍湯加蔓荊子如脈寸強尺弱者六味地黃湯加牛膝五味子此余歷驗者敗血攻衝而致者芎歸湯或沖童便八珍湯見月經門二三六味地黃湯見月經門十五芎歸湯本門五心胃痛七産後心胃痛有二一風冷凝滯氣血一飲食停留中脘也蓋産後氣血衰微諸凡最易干襲若四肢厥逆面爪青白而痛者乃風冷凝滯氣血不能宣通也若嘔吐惡食心胃脹滿而痛者乃飲食停郁中脘無力輸運也倘大便硬結小便赤澀渴欲飲冷者又屬內有實熱法當從下也若心胃痛而四肢厥逆者大岩蜜湯嘔吐惡食而胃痛者加味二陳湯大便硬結屬實熱者不妨少與玉燭散攻而利之大岩蜜湯本門六加味二陳湯本門七玉燭散見月經門五三腹痛八産後腹痛其因有四或去血過則臟府乏其充養或惡露去少則瘀血凝滯不通或恣食過傷必見惡食脹滿或寒乘胞中必有冷凝形狀皆致痛之由也治此之法血少者補養之瘀滯者開逐之食傷者消導之風寒乘於胞中者溫散之然倘數朝以內飲食如常忽爾腹痛六脈沉伏四肢厥冷此惡血不盡傷食里血而脈不起也不可誤認氣血兩虛輒用大補須消導兼以行血可也若去血過多者當歸建中湯或八珍湯當歸羊肉湯瘀血壅滯者失笑散最驗飲食傷者異功散加山楂神麯或查木二陳湯風寒乘虛入於胞中者香桂散或吳茱萸湯當歸建中湯見月經門三二八珍湯見月經門二三當歸羊肉湯本六八失笑散見崩漏門八異功散本門九查術二陳湯本門十香桂散本門十一吳茱萸湯見月經門三一少腹痛九産後少腹痛者乃血塊未淨名曰兒忱痛蓋兒在胎中宿有血塊産時其血破敗與兒俱下則無是患若臟府為風冷所幹則血凝少腹之間故結聚疼痛也察此之法須於小水辨之其小便利者為瘀血凝結小便不利淋澀脹痛者乃蓄水作祟也倘堅硬紅腫者須防潰疝癃之患矣若兒枕痛者延胡索散屬蓄水為患者五苓散將成潰疝癃者吳茱萸湯以溫而散之延胡索散本門十二五苓散見胎前門八吳茱萸湯見月經門三一脅痛十産後脅痛由瘀血凝滯使肝氣不能流暢或所下過多氣血虧而失滋榮夫脅者肝之部分也但有左右氣血之不同當明辨析左痛者血滯也右痛者氣虛而兼血弱也詳而施治鮮不效矣若左脅痛屬血滯者延胡索散屬血虛者四物湯加參朮柴胡右脅痛屬氣滯者四君子湯加柴胡青皮或四君子湯加柴胡薄佳若氣血兩虛而因去血過多者八珍湯加肉桂治之延胡索散本門十二四物湯見月經門一四君子湯本門十三八珍湯見月經門二三腰痛十一腰者腎之府胞胎之所繫也産則陰血暴脫腎氣損傷故每多痠痛之患若腰中重墜下注兩股痛如錐刺者乃産時風冷乘襲瘀血滯於肝經不即治療久之必作癰疽也若因去血過多三陰虧損而痠痛者八味地黃湯加杜仲續斷風冷乘襲痛注兩股者佛手寄生湯溫而散之八味地黃湯見月經門十六佛手寄生湯本門十四遍身痛十二産後遍身疼痛山去血過多榮血不足衛氣衰微不能榮養也或風寒外客必有表證可憑倘面唇色紫身脹而痛則屬停瘀所致也若去血過多榮血不足或風寒外客者均宜趁痛散主之榮衛氣血兩虛者人參養榮湯加黑姜面唇色紫者當以行瘀止痛為主秦沒四物湯瘀和而痛自止也趁痛散本門十五人參養榮湯見月經門二二秦沒四物湯本門十六腹中塊痛十三産後腹中有塊堅硬攻痛者多因新産之後風冷乘虛而入以致瘀血凝結也宜速驅逐久則必成血瘕又有寒疝一證亦在少腹攻築疼痛此屬寒氣滯澀當溫以散之若瘀血凝結者急宜延胡索散逐而行之寒疝攻痛者宜吳茱萸湯溫而散之延胡索散本門十二吳茱萸湯見月經門三一筋攣十四産後筋脈拘攣疼痛不能舒展俗名雞爪風皆由産後血液虧損不能榮筋故令拘攣疼痛也大法宜養榮血佐以舒筋蓋血足則筋有養矣若無汗者宜養榮之中兼以祛邪宜四物湯加柴胡木香桂枝釣藤鉤若有汗者宜大補榮血用八珍湯加桂枝黃耆阿膠四物湯見月經門一八珍湯見月經門二二傷食嘔吐十五産後氣血俱虛脾胃自弱一切飲食最宜戒慎苟恣欲無忌過食肉面炙煿之物以致心胸飽悶惡聞食氣嘈雜嘔惡吞酸吐酸者此食傷脾胃也但産後氣血虧虛不可同尋常論治惟宜助健脾氣佐以消導使食消而脾不傷也若嘔吐噁心者六君子湯加香附砂仁神麯山楂惡食飽悶者六君子湯加厚朴嘔逆痰涎者此必挾痰飲而作也二陳湯重用半夏更加藿香吞酸吐酸者六君子湯加柴胡吳萸六君子湯見經閉門五二陳湯本門十七厄逆十六厄逆者屬脾虛聚冷胃中伏寒也蓋産後氣血並傷臟府皆損飲冷食寒以致中焦之氣厥而不順法當溫暖脾胃然有中氣大虛不能按納下焦真氣逆奔上衝亦能致此其聲必長其候殊惡又當溫補命門為主矣若脾虛胃冷者丁香豆蔻散如不應當以參附湯峻補之若發熱面赤者屬熱實也茹橘飲下焦真氣逆沖者都氣湯丁香豆蔻散本門十八參附湯本門十九茹橘飲本門二十都氣湯本門二一氣喘十七産後喘促極危之證也因所下過多榮血暴竭衛氣無依孤陽上越獨聚肺中誠陰竭陽浮之候最難治療者也然惡露不行敗血上攻於肺者亦能致此必面色紫黑喘息氣壯為辨耳若脈細無力面唇色白或面顏淡紅者屬孤陽也宜驟固補急以參附湯遲則不救如有上面唇之色而氣則出多入少脈見寸口浮大無力關沉尺細或微或脈雖豁大按之則隱者此陰竭陽浮之象誠真陰涸竭孤陽上脫之候也宜加味都氣湯余嘗用此多臻奇效面色紫黑者此敗血上攻也奪命散稍涉虛者二味參蘇飲參附湯本門十九加味都氣湯見經閉門九奪命散本門一二味參蘇飲本門二二浮腫十八産後浮腫多由敗血停留乘虛流入經絡血化為水故令浮腫然有氣分血分水腫之別不可不辨輕虛浮腫心胸脹滿因素有水飲名曰氣分也皮如熟李遍身青腫者名曰血分也若喘嗽小便不利為水腫矣若屬氣分者枳朮湯屬血分者小調經散水腫者茯苓導水湯枳朮湯本門二三小調中湯本門二四小調經散本門二五茯苓導水湯見胎前門十四發熱十九産後發熱因端甚多不可執一論治蓋陰血暴亡諸邪易湊或陽無陰斂而浮游肌表或恣貪飲食而壅滯胃中或惡露不去則瘀血留滯或蚤起勞動則困乏使然或三朝蒸乳或感冒風寒諸如此類皆致熱之由也咸當詳細審辨不可孟浪施療倘獨執一熱投以清涼則禍如反掌矣若因亡血過多致陽無所附而熱者四物湯加炮姜此從陰引陽之治也血脫煩躁乾渴面赤者當歸補血湯如脈浮虛按之則微此孤陽外越也急宜參附湯遲必汗出大喘乃陽欲亡之象雖藥終斃矣飲食過傷者異功散加山楂神麯厚朴生薑脾虛不能化食者六君子湯嘔惡者香砂六君子湯惡露不去致瘀血留滯者必兼腹痛之證生化湯蚤起勞動而致者十全大補湯或八珍湯熱在三朝為蒸乳也不須藥療感冒風寒治詳本條見後二一四物湯見月經門一當歸補血湯見月經門十一參附湯本門十九異功散本門九六君子湯見經閉門五香砂六君子湯見月經門三九生化湯本門二十全大補湯見月經門二四八珍湯見月經門二三寒熱二十産後寒熱有往來寒熱乍寒乍熱寒熱似瘧壯熱憎寒之別名既不同其證亦異寒熱往來者寒去熱來熱去寒來遞相更換為氣血虛損陰陽不和也乍寒乍熱者有時作寒有時作熱無定之時乃陰陽相乘榮衛不調也寒熱似瘧者或先寒後熱先熱後寒一定不移至其時而始作緣飲食停滯或敗血不散而然也壯熱憎寒者其身既壯熱而復時時畏寒因汗出遇風玄府閉祕也有諸內自形諸外須明辨之斯克效矣若陰陽不和寒熱往來者柴胡四物湯或追遙散榮衛不調乍寒乍熱者乃陰陽相乘也蓋陽乘陰則熱陰乘陽則寒宜增損四物湯或八珍湯少加柴胡若敗血停留兼食傷中寒熱似瘧者生化湯加柴胡山楂神麯感受風寒憎寒壯熱者更生散柴胡四物湯見月經門五二逍遙散見月經門九增損四物湯本門二六八珍湯見月經門二三生化湯本門二更生散本門二七感冒二一新産之後不謹調護因而感冒風寒以致頭痛脊強發熱惡寒者慎勿峻劑表散蓋産後大血既去氣因亦虧表裡空虛雖即微邪亦易乘襲當以養血為主佐以疏解主強則賊自遁避血和則風寒消滅不知此誤投峻散之方津汗一出重則亡陽輕則惕瞤或鬱冒昏迷或抽搐便祕變幻諸證靡非過散之害也若頭痛發熱惡寒者蔥柴四物湯頭痛脊強體疼者羌佳四物湯蔥柴四物湯本門二八羌桂四物湯見月經門三六自汗二二産後陰血既亡陽氣因之而虛誠陰陽兩虧之時若微汗自出乃榮衛和調之象倘自汗如洗極危證也蓋汗本血液産既亡陰而復大汗豈不虧而又耗乎究其由緣陰氣虧損不能斂藏故陽氣外越而汗出不收速宜固密衛氣否則陽亡而斃矣若自汗太甚者宜黃耆湯如陰血大脫孤陽外越致汗不止者非大劑參附湯不可或更加五味子其效尤捷黃耆湯本門二九參附湯本門十九頭汗一二産後陰亡陽氣獨盛上蒸於頭故但頭汗出至頸而還也夫陽既獨盛微汗則損陽就陰兩相平均無足為慮設大汗淋洗乃陰既下亡陽夏上脫危劇之候也若微汗至頭而還者當歸六黃湯內芩連黃柏三味俱炒黑用之大汗淋洗者治見上自汗條亙互參考當歸六黃湯本門三十中風二四婦人以榮血為主産時下血太多臟府虧損未曾平復蚤起勞動因而風邪乘襲客於皮膚經絡以致筋骨疼痹羸乏少氣唇青肌冷神昏目眩凡筋脈挾寒則攣急喎僻挾熱則縱緩虛弱種種證狀皆由氣血虛損所召經所謂邪之所湊其正必虛也治此者宜大溫補雖有他證從末治之宜十全大補湯如牙關緊結令人推正其身一人夾正其面挖開口灌之如不得下令側其面出之仍灌熱者又冷又灌數次即能下咽少傾可蘇此立齊法也蘇後酌宜施治十全大補湯見月經門二四痙病二五産後血氣皆虛臟府均弱多自汗出腠理不密風邪乘間襲入遂成痙證三陽之筋結於頷頰風乘之則口噤陰陽經絡用環於身風乘之則頭項肩背強直如角弓反張之狀證雖不一實陰血不足無以榮養筋脈而然也當以培補氣血為主其勢自解若見頭搖喘促汗出不止兩手撮空乃真氣去邪氣獨留必死之候也若角弓反張口噤鼓頷者附防十全大補湯附防十全大補湯本門三一瘛瘲二六夫瘛者筋脈拘急也瘲者筋脈弛縱也産後患此由去血過多筋無所養陽火熾盛致使抽搐發熱心煩口渴經曰肝主筋藏血蓋肝氣為陽為火肝血為陰為水值此陽旺陰衰之際當以養陰為主則陽火退而諸證息不應則以補脾為要蓋血生於至陰至陰者脾也若無力抽搐戴眼反折大汗不止者其命將休不治之證也若治此者宜釣藤八珍湯主之如不應用釣丹四君湯釣藤八珍湯本門三二釣丹四君湯本門三三不語二七産後不語須分虛實有痰熱乘心者有敗血衝心者有氣血兩虛而鬱冒神昏者大抵産後屬虛者多而實者少也治者詳之若氣血兩虛者加味八珍湯痰熱者星連二陳湯敗血衝心者七珍散加味八珍湯本門三四星連二陳湯本門三五七珍散本門三六驚悸恍惚二八産後陰血虧虛心氣怯弱神志失守邪熱乘心以致驚不自安悸動不定目睛不轉恍惚疑懼者惟宜養血安神蓋血足則神有藏舍驚悸何能作哉若血虛而致者茯神散憂愁思慮而傷心脾者鎮心歸脾湯茯神散本門三七鎮心歸脾湯本門三八發狂譫語見鬼二九産後發狂譫語妄見鬼神由敗血衝心或心血虛損敗血衝心者面顏赤紫其聲壯厲而揮亂心血虛損者面唇黃白神志恐怯而言微以此辨之最為確當若敗血衝心者小調經散心血虛損者妙香散以當歸熟地煎湯調服其效如神小調經散本門二五妙香散本門三九虛煩三十産後虛煩其致有三或陰血虧竭因見氣浮而短或敗血衝心雖煩多兼脹痛之證若煩而躁者乃去血過多亡陰所致也若心煩而短氣者人參當歸湯敗血衝心者失笑散亡血過多者當歸補血湯則煩躁皆除也人參當歸湯本門四十失笑散見崩漏門八當歸補血湯見月經門十一發渴三一産後發渴者氣血虧虛也蓋陰血暴亡津液短少不能上奉廉泉涸竭故口乾而渴也治當審其偏氣偏血鮮有不愈者若津液不足者參麥飲血虛而渴者麥粉四物湯渴甚不解者竹葉歸耆湯參麥飲本門四一麥粉四物湯本門四二竹葉歸耆湯本門四三咳嗽三二産後咳嗽有蚤起勞動感受風寒者必有頭疼身痛可據有敗血上衝入肺者必見面唇紫赤之色治此之法外感者疏散之敗血者消逐之無難事已然因陰虛而致者居多蓋産後陰血大脫則真陰必虛陰虛則火無制上刑肺金欲不咳嗽勢難容己當以滋金壯水以漸圖功也若感冒風寒者旋覆花湯敗血上衝入肺者桃紅佛子散真陰虧虛者麥味地黃湯滋其化源必自愈也旋覆花湯本門四四桃紅佛手散本門四五麥味地黃湯見經閉門四衄血三三産後衄血乃惡露不下虛火載血上行不能循其經隧故溢出鼻竅也若兼黑色見干口鼻為熱極反兼水化系胃絶肺敗之候藥餌最難醫者蓋凡色紅赤者陽熱之生氣也青黑者陰寒之絶氣也況口鼻為陽明多氣多血之部而見陰寒慘殺之氣則胃中陽和之氣衰敗可知其下死也幾希若強欲治此者惟人參澤蘭葉湯或冀其萬一耳人參澤蘭葉湯本門四六痢疾三四産後痢者名産子痢多因飲食不謹恣貪生冷或起居不慎沖寒受暑所致若腹中㽲痛裡急後重者屬有餘日久虛寒滑脫者屬不足其色黃赤稠黏多屬於熱清稀澄徹如鴨糞者則屬於寒此虛實寒熱之辨也更以脈息遲數參之庶不致誤治之之法熱者清之寒者溫之冷熱不和者調之虛者補之實者瀉之虛實新久之間宜細心詳察也若其色黃赤稠黏者熱也槐連四物湯清其熱而堅腸胃或六一四物湯亦可赤白相兼者冷熱不和也芍藥湯調之色白清稀滑脫者虛寒也真人養臟湯溫而澀之日久不止必氣血大虛十全大補湯若見色白或黃而清稀次數甚多或久不止此因産大虛腎廢封藏之職也當以溫固腎氣為主宜八味地黃湯去丹皮加故紙五味兔絲子若為風寒沖感而致者人參敗毒散因暑濕而致者香連丸痢下純紅名曰血痢此敗血滲入大腸也膠榆四物湯槐連四物湯本門四七六一四物湯本門四八芍藥湯本門四九真人養臟湯本門五十十全大補湯見月經門二四八味地黃湯見月經門十六人參敗毒散本門五一香連丸本門五二膠榆四物湯本門五三瘧疾三五瘧疾之發各有常期或一日一發或間日三日而一作或先寒後熱或先熱後寒如信人有約定不爽也産後患此多因瘀血停留榮衛不和故有斯疾然有似瘧一證亦發寒熱蓋因氣血並竭陰陽兩虛陽虛則作寒陰虛則發熱也二者之治須當詳辨倘率以瘧法施治則禍不旋踵