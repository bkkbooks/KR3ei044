空心溫服即效其服數不拘多少總以病好為度大約重者不過四五服輕者二三服而已一孕婦有患熱病六七日小腹疼痛欲死指甲青色而口中出沫者皆因臟府熱極以致子死腹中不能順下耳若眼此藥即産用滑石榆皮各一錢煎湯加陳酒三分和藥服如不熱連鍾頓滾水內候熱服一凡難産者因子在母腹飲血十個月或有餘血凝結為塊名曰兒枕生時兒枕先破敗血流入衣胞中所以難産急服此藥逼去敗血自然易生用炒黃燕子糞滑石榆皮各一錢煎湯加酒三分和藥服一胎衣不下敗血流入衣中所致用炒黃燕子糞滑石榆皮各一錢煎湯加酒三分和藥服一産後三五日起坐不得眼見黑花及心迷不識人者因敗血流入五臟奔注於肝庸醫不知誤認為暗風治之必死惟此藥能救用陳酒一鍾將生鐵燒紅浸其內候鐵冷取出再燒紅浸之如是三次用榆恨皮炭延胡索各一錢煎入陳酒童便各三分和藥服一産後口乾心悶多煩渴者乃氣血未定便吃腥酸熱物以致余血結聚於心故有此症用當歸一錢煎湯入童便三分和藥服一産後寒熱往來頭疼腰背痛者皆産時偶受風寒邪氣入於腸內敗血不盡上連心肺下至肝腎故有此症用當歸一錢煎湯入童便三分和藥服一産後發熱或遍身寒冷皆因敗血攻注於四肢停滯日久不能還元仍結膿血甚至四肢俱腫若作水腫必誤蓋水腫則喘小便澀滯氣腫則四肢寒熱須細細辨明先服此藥逐去敗血次服通寶散立效用官佳紅花各一錢煎湯入陳酒三分和藥服一産後言語顛狂眼見鬼神乃敗血攻心所致急眼此散用當歸一錢酒半鍾煎湯入童便三分和藥服一産後失音不語是七孔三毛九竅多被敗血沖閉所以言語不得用延胡索棕皮各一錢煎湯入陳酒三分和藥服一産後腹痛兼瀉痢或腹脹虛滿者皆因月中誤吃生冷熱物而余血結聚日久漸甚腹脹疼痛米穀不消或膿血不止水氣入腸冷痛或敗血入小腸變赤白帶須先眼此藥逐去敗血然後調洽瀉痢用葛恨一錢煎湯入童便陳酒各二分和藥服一産後百節疼痛乃敗血入於關節之中聚結虛脹不能還元故耳用酒半鍾牛膝一錢煎湯入童便三分和藥服一産後有血崩如雞肝昏悶發熱者因敗血未定誤吃腥酸之物所致用樟柳根杏膠各一錢煎湯入陳酒三分和藥服一産後昏迷驚恐氣逆咳嗽四肢寒熱口乾心悶或背膊酸腫腹中時痛皆因血未還元早吃熱物麵食致有此症日久甚至月經不通黃赤帶下而小便或滑或脹急服此散用樟柳根杏膠各一錢煎湯入陳酒三分和藥服一胸膈氣滿嘔逆者敗血未淨心有惡物肺氣不清所以如此不可作傷食治宜服此藥可用樟柳根杏膠各一錢煎湯入酒三分和藥服一産後小便赤色大便澀滯或産門脹腫乃敗血流入小腸閉卻水道所致切勿認作淋澀當服此散用樟柳根杏膠各一錢煎湯入陳酒三分和藥眼一産後舌乾鼻衄繞項生點者敗血流入五臟也用當歸一錢酒半鍾煎湯入童便三分和藥服一産後腰痛眼澀或渾身拘攣牙關緊閉或兩腳如弓狀如中風者因百日之內過行房事耳用烏蝦蟆麻子各一錢煎湯入陳酒三分和藥服一産後臟腑不安言語不得咽喉作蟬聲者乃月中誤吃熱物或停宿食而敗血攻注喘息間上下往來與牙關相緊故有此症用乳香一錢煎湯入陳酒三分和藥服原方本系未藥如倉卒有患産症者未獲制末藥即照原方藥料用十分之一仍按症照引煎服以病好為度亦百試百驗
