body:
  text: 卷五胎前諸證門胎證總領一妊婦胎前變顯極多其最易犯者惡阻胞阻子腫子氣子滿子煩子懸子癇子嗽子淋轉胞激經胎漏尿血吐血胎動不安墮胎小產滑胎子死腹中臟燥鬼胎腸覃石瘕母子盛衰等證共計廿四條皆當一一詳辨其餘胎前傷寒傷食瘧痢霍亂泄瀉等疾當於雜證門中參考施治但須時刻保護胎原不致誤犯為要耳惡阻二妊孕月餘噁心嘔吐名曰惡阻蓋婦人受胎之後胎門壅塞臟氣內阻挾胎氣衝逆於胃中宮郁遏不能舒布以致頭目昏眩心虛煩悶體重肢倦嗜酸擇食輕者勿藥可愈重者必須調理治此之法惟求於胃審其寒熱辨其痰飲或胃素虛或氣攻衝隨宜施治鮮不效矣若胃素虛者保主湯胃寒者必喜熱飲六君子湯吐多痰水且心煩頭目眩暈者其入必胃中素有停飲也宜加味六君子湯若嘔吐心中煩熱憒悶喜飲涼漿者胃熱也加味溫膽湯倘愈止愈急者須效仲景法停藥月餘自安保生湯本門一六君湯見經閉門五加味六君湯本門二加味溫膽湯本門三參橘飲本門四胞阻三孕婦腹痛名曰胞阻致此之由有食滯胎氣胞寒水熱之分欲察其因須審痛處若在心胃分界者屬食屬滯消導即愈在少腹之間小便清利者必因胞血受寒法當養血溫暖下焦或小水閉澀而痛者則是膀胱蓄熱所致但清熱決水其治無難惟腹痛連腰乃胎氣作祟或有觸犯而然治此不易若兼下血尤屬可畏何也蓋胎繫於腎腰者腎之府也若不急為安養恐墮隕接踵而至矣若心胃作痛者食傷停滯也宜加味平胃散若大便秘結日久加大黃以攻之必倍甘草以緩其峻庶不傷胎若少腹作痛者乃胞血受寒也宜加味芎歸飲小便閉澀而痛者膀胱積熱也導赤散若水盛陽虛不化者宜五苓散苦內熱大小便閉者蜜消煎腰腹作痛胎動下血者宜延胡四物湯定痛而保胎下血更多而痛者須防墮胎宜加味膠艾四物湯加味平胃散本門五加味芎歸飲本門六導赤散本門七五苓散本門八蜜消煎本門九延胡四物湯本門十加味膠艾四物湯本門十一子腫子氣子滿皺腳脆腳四孕婦頭面浮腫或漸及遍身小便短澀者水氣為病也名曰子腫自足腫至膝或指縫出水小便長利者濕氣為病也名曰子氣若遍身俱腫腹脹而喘在六七個月之間者名曰子滿但兩腳腫而膚厚者屬濕名曰皺腳皮薄者屬水名曰脆腳大凡水之為病多喘促氣之為病多脹滿喘促屬肺脹滿屬脾也以其人素有水氣濕邪故受孕有腫滿之證兒未成形被水浸漬其胎每致損壞已成形者尚可調治故五六個月後而有是證者每多生育但兒手足軟而有疾耳子腫全生白朮散子氣天仙藤敞子滿皺腳脆腳茯苓導水湯子腫子氣亦宜准此全生白朮散本門十二天仙藤散本門十三茯苓導水湯本門十四子煩五孕婦別無他證惟時時心煩者名曰子煩由陰既養胎孤陽獨旺上乘於心故使煩熱不寧也宜知母飲加減主之或犀角散亦可知母飲本門十五犀角散本門十六子懸胎上逼心六孕婦心胸脹滿名曰子懸由其人累有寒氣重因食冷與氣相傳故胸次脹滿不舒也更加喘甚者名為胎上逼心其因亦然調之之法咸直流氣養血為主惟紫蘇飲兼善其功紫蘇飲本門十七子癰七孕婦忽然顛仆痰涎壅盛抽搐不省人事須臾自醒頃復如常名曰子癇乃肝心二經血虛所致蓋血虛則主熱熱盛則生風也經曰諸風掉眩皆屬於肝始發之際宜疏風清熱既醒之後須以養血為主所謂血和風自滅耳若抽搐微者羚羊角散甚者鉤藤湯主之若口眼歪斜半身不遂則已成中風廢證當於中風門參考羚羊角散本門十八鉤藤湯本門十九子嗽八妊娠咳嗽名曰子嗽有感冒風寒痰飲上逆陰虛火動之不同若不速治久必傷胎感冒者必有表證可據一散可解痰飲上逆者痰涎必多法當理氣化痰陰虛火動者身體壯熱其嗽午後益甚須以壯水滋金為主則痰可瘳而胎可保矣若感冒風寒者桔梗湯痰逆涎盛者枳桔二陳湯久嗽陰虛者麥味地黃湯桔梗湯本門二十枳潔二陳湯本門二一麥味地黃湯見經閉門四子淋九孕婦小便頻數窘澀點滴疼痛者名曰子淋由氣血聚養胎元不及輸運滲道遂使膀胱鬱熱小水為之不利也法當養血清熱佐以利水然亦有中氣虛弱無力升提胞壓於脬因致小水不利者須從升補別之之法在脈有力無力間也若因膀胱鬱熱者加味五淋散或安榮散日久倦怠脈虛弱者補中益氣合四苓散舉而利之加味五淋散本門二二安榮散本門二三補中益氣合四苓散本門二四轉胞十妊娠臍下急痛欲小便不得飲食如常心煩不能安臥者名曰轉胞凡尿急疾趨或忍尿飽食胎因下墜壓及胞系水竅閉遏故有是證當升提其胎胎舉而胞系亦疏水道自通矣不可滲利非獨無益也宜先用丹溪舉胎法令穩婆剪去指甲香油塗手從玉門托起其胎則尿自出暫救其急遂以舉胎四物湯煎服探吐如是三四次則胎舉而小便通利矣若其素賦氣虛者用補中益氣湯服吐如上法亦安倘若不應乃繫有飲宜阿膠五苓散清而利之舉胎四物湯本門二五補中益氣湯見月經門四八阿膠五苓散本門二六激經十一婦人受孕之後經夏循月者名激經緣胎尚徽其血榮養有餘故坦然無恙勿妄治療俟胎形漸長則血壅護胞中而經不再見矣今世云七八月產子者率都由此惜人未能察耳胎漏十二妊娠下血其腹不痛謂之胎漏由衝任脈虛不能約制血海或胞中蓄熱致使經水妄行或勞役傷脾無力統攝歸原或怒氣傷肝因得疏泄肆權故血時下淋漓不止也當為速治否則胎於而壅矣若衝任氣虛者其漏下黃汁或如豆汁黃耆湯或銀苧酒胞中蓄熱其血必多或色紫黑阿膠湯清之勞役傷脾者歸脾湯怒氣傷肝者加味逍遙散黃耆湯本門二七銀苧酒本門二八阿膠湯本門二九歸脾湯見月經門十四加味逍遙散見月經門十尿血十三附胎動胎漏尿血辨妊娠尿血由於胞熱或勞怒動火血為火熱搏激遂滲入膀胱故血從尿出治此之法唯血餘四物湯或加山梔仁足稱神劑血餘四物湯本門三十按胎動胎漏尿血三證俱見下血第胎動腹痛胎漏腹不痛然胎漏尿血腹皆不痛亦有差別尿血出自溺孔胎漏出自人門為異耳吐血十四妊娠吐血皆屬於熱蓋氣血壅聚胞元胞中恆多鬱熱或為暴怒傷肝或因膏梁積胃一有於犯則火乘氣上血隨而溢也若胞中鬱熱者芩連四物湯怒動肝火者加味逍遙散膏梁積胃者清胃飲胃經有火者犀角地黃湯芩連四物湯見月經門二加味逍遙散見月經門十清胃飲本門三一犀角地黃湯見月經門四五胎動不安墮胎小產滑胎十五氣血充盛形體壯實則胎元安固何患之有加以調攝穩如磐石苟或衝任虛損勞役太過因患他疾延綿偶為磕觸跌撲或暴怒以傷肝或房勞而虧腎此不安墮胎小產滑胎所由出也蓋衝任虛損胞中乏其蔭養勞役太過氣血難以周榮他疾延綿則胞蒂萎而不固磕觸跌撲則胎元損而難安暴怒傷肝則疏泄用事子宮受搏因而不能弭靜房勞虧腎則封藏失職真元盜泄難御欲火熬煎今世患是證者率由乎此然小產墮胎亦自有別五七月兒體已成名為小產二三月形象未備謂之墮胎若懷孕三五七月無故而隕及下次受娠亦復如是者名曰滑胎犯此者宜預補肝腎以杜後患尤宜戒房欲節勞役庶幾有濟種植者可不慎歟若衝任虛損勞沒太過腹痛不下血者加味聖愈湯腹痛已下血者加味佛手散因患他疾干犯者十聖散磕觸跌撲胎欲墮者芎藭湯調下益母丸暴怒傷肝者逍遙散房勞虧腎者地黃飲慣於滑胎者尤宜長需倘腹痛連腰血下時多挽留難矣蓋胎繫於腎腰為腎府也若胎已墮血下不止面黃唇白者脫榮怔也急用獨參湯峻補其氣以生其血斯時也有形之血不能速生無形之氣所當急顧使無形主出有形也若惡血瘀滯不行腹脅脹痛者宜於回生丹益母丸酌其宜而用之屢經墮胎者宜千金保胎丸加味聖愈湯本門三二加味佛手散本門三三十聖散本門三四芎藭湯本門三五益母丸本門三六逍遙散見月經門九地黃飲本門三七獨參湯本門三八回生丹見後產後門六六千金保胎丸本門三九子死腹中十六妊婦胎死須先驗舌其色青而面紅和者子死之證也當急驅逐不可遲延更兼肚腹脹大或腹如冰甚而冷沖嘔惡口出穢氣者最危之候也尤宜急下然必審其虛實別其寒熱隨直施用方盡活人高手若人虛羸者佛手散大加肉佳人壯實者平胃散加芒消佛手散月經門八平胃散本門四十子母存亡辨十七凡妊婦一切凶危之候欲知子母存亡者當於孕婦面舌之色定之若面赤舌青其子必死面青舌赤其母已亡倘面舌俱見青色兩口角流涎沫者子母二命皆難保也胎兼癥瘕十八凡妊婦素有癥瘕或新有病當攻者俗云有娠不可攻削此臆說也經曰婦人重身毒之何如有故無殞亦無殞也言藥雖峻利有病則病受之不能傷及胎氣故重示亦無殞也之句但宜衰其大半而上毋過孟浪又何必據有娠不可攻之說也耶胎萎不長十九夫胎處於胞中全賴氣血滋養凡妊娠至五六月其胎萎不長者由妊母稟賦虛羸氣血虧弱而然但當大補中州使飲食日進氣化有自血因以生更當大補氣血則胎自長而不萎矣若脾胃久虛飲食不迸者六君子湯氣血兩虧者八珍湯六君子湯見經閉門五八珍湯見月經門二三子喑二十妊娠至九月聲音細啞者謂之子喑蓋足少陰之脈系舌本因胎形長大阻遏其脈不能上至於喉故發言不亮非絕然無聲也不必治療俟十月子生其絡復通則能言矣岐伯有言曰無治也當十月復子啼二一孕婦腹內有鐘聲或嬰兒在內啼哭者名曰子啼蓋兒在腹中口含臍帶上血餅因妊母登高舉臂脫出其口故兒作聲令妊婦曲腰如拾物狀仍入兒口則聲即止古書雖載其證然不經見設偶有之者惟黃連煎主之黃連煎本門四一臟燥二二孕婦無故時刻悲傷哀痛象若神靈依憑者名曰臟燥夫悲者肺情之所主燥者金氣之所化因氣血壅養胎元津液不能上奉故肺燥而悲也甘麥大棗湯主之甘誇大棗湯本門四二鬼胎二三邪思情感鬼胎因生夫鬼者偽也晝之所思為夜之所見婦女之情心淫而動則肝腎相火翕然而起淫精異位凝聚胞中其形漸長腹因漸大儼若懷子非實有鬼神交接而後始成也經所謂思想無窮所願不得化為白淫者是也法當攻積破血則經通而腹消矣宜於後石瘕腸覃條互參腸覃石瘕二四經曰寒氣客於腸外與衛氣相傳氣不得榮因有所繫癖而內著惡氣乃起息肉乃生其始生也大如雞卵稍以益大至其成如懷子狀按之則堅椎之則移月事以時下石瘕生於胞中寒氣客於子門子門閉塞氣不得通惡血當寫不寫衃以留止日以益大狀如懷子月事不以時下皆生於女子可導而下由此觀之雖皆如懷子狀腸罩氣病而血不病故月事以時下石瘕先氣病而後血病故月事不來也石瘕宜吳茱萸湯主之腸覃宜香稜丸主之吳茱萸湯見月經門三一香稜丸本門四三母子盛衰二五娠母強壯胎元盛實則胎前產後但然無虞倘孕氣萎弱者則胎前病必多母氣衰羸者則產後疾迭見以此察之可預知也胎孕變常記二六李時珍曰女子二七天癸至七七天癸絕此其常也有女年十二十三而生子如褚記室所載平江蘇達卿之女年十二受孕有婦人年五十六十而生子如遼史所載亟普妻年六十生二男一女此又異常之尤者也胎前門匯方保生湯一人參甘草各二錢白朮土炒香附子烏藥炒橘紅各五錢上銼每服三錢姜五片煎服加味六君湯二人參白朮土炒茯苓陳皮半夏各一錢五分制甘草五分制藿香葉枇杷葉各一錢制縮砂仁炒枳殼各八分炒上銼生薑煎服加味溫膽湯三陳皮半夏制茯苓各一錢甘草五分炙枳實竹茹黃芩各一錢黃連八分麥冬二錢去心蘆根一錢上銼薑棗煎服參橘飲四人參橘皮茯苓麥冬去心厚朴薑汁炒白朮各一錢土炒甘草五分制竹茹一團上銼加生薑煎服加味平胃散五厚朴薑汁炒蒼朮米泔浸炒陳皮甘草炙人參各一錢上為末每服三錢加姜煎服大便秘結加大黃倍甘草加味芎歸湯六當歸五錢酒洗川芎二錢吳茱萸八分甘草水制靳艾酒炒一錢甘草六分炙阿膠二錢蛤粉炒人參一錢去蘆水煎溫服導赤散七生地三錢木通二錢甘草梢一錢燈心一團煎服五苓散八白木土炒茯苓豬苓澤瀉各二錢半桂三分上銼作一服水煎服蜜消煎九蜂蜜芒硝上煎溶化服延胡四物湯十延胡索三錢酒煮透當歸二錢酒洗川芎一錢五分熟地二錢白芍二錢酒炒上銼水煎服加味膠艾四物湯十一當歸酒洗熟地阿膠白芍各二錢酒炒杜仲一錢五分鹽水炒靳艾各八分上加蔥白三寸大豆淋酒煎服芳因外感之邪加羌活一錢或濁活以散之全生白朮散十二白木二錢半土炒茯苓皮一錢半陳皮生薑皮大腹皮桑白皮各一錢上銼水煎服或為細末每服三錢米飲調下亦可天仙藤散十三天仙藤洗略炒香附子炒陳皮甘草烏藥木香各等分上銼每服五錢加生薑三片紫蘇五葉水煎日三服腫消止藥茯苓導水湯十四茯苓檳榔豬苓縮砂澤瀉白朮木瓜大腹皮桑白皮蘇梗各等分上銼加生薑煎服脹加枳殼喘加苦葶藶子腿腳腫加防己知母飲十五知母麥冬甘草各五錢黃耆子芩赤苓各七錢五分上㕮咀每服四錢水一盞煎至七分去滓入竹瀝一合溫服犀角散十六犀角尖磨汁臨服投入地骨皮赤茯苓麥冬去心條芩各二錢甘草五分上銼水煎入竹瀝一合溫服紫蘇飲十七當歸川芎白芍各二兩陳皮蘇莖葉大腹皮各一兩甘草炙人參量虛實用上㕮咀每服五錢水二盞生薑五片煎至一盞去滓服日進二服有熱加黃芩竹茹心煩加羚羊角有食加神麯山楂羚羊角散十八羚羊角鎊獨活酸棗仁五加皮防風薏苡仁杏仁當歸酒浸川芎茯神各五分去木甘草木香各二分上㕮咀加生薑五片水煎服釣藤湯十九釣藤鉤當歸茯神人參各一兩苦桔梗一兩五錢桑奇生五錢上為粗末每服五六錢水二盞煎至一盞去滓溫服無時忌豬肉菘菜煩熱加石膏二兩五錢臨產月加桂心一兩桔梗湯二十天冬去心桑皮桔梗紫蘇各五分麻黃三分去節貝母人參甘草各二分炙上銼加生薑水煎服一方有杏仁無貝母枳桔二陳湯二一陳皮半夏茯苓各二錢甘草五分炙枳殼桔粳各一錢上銼姜水煎服加味五淋散二二赤苓二錢山梔一錢炒黑當歸一錢白芍二錢子芩八分甘草五分生地二錢澤瀉一錢車前一錢木通一錢上水煎服安榮散二三當歸白芍各二錢麥冬一錢半去心通草一錢滑石六分人參一錢水煎溫服此方加石斛山梔其效尤捷補中益氣合四苓散二四人參一錢黃耆蜜炙白木土炒當歸各二錢升麻柴胡各五分陳皮八分甘草六分赤苓澤瀉豬苓各一錢上加薑棗煎溫服舉胎四物湯二五當歸酒洗白芍酒炒熟地川芎人參白朮各二錢土炒陳皮升麻各一錢上銼水煎服阿膠五苓散二六阿膠澤瀉各二錢豬苓白木茯苓各一錢半肉桂三分上銼水煎溫服黃耆湯二七黃耆糯米川芎上銼細末水二大盞煎至一盞溫服一方無川芎銀苧酒二八苧麻根二兩銼紋銀清酒一盞上以水二大盞煎至一大盞去渣分溫二服阿膠湯二九阿膠炙燥熟地焙艾葉微炒川芎當歸焙杜仲去粗皮炙銼白朮各一兩上㕮咀每服四錢水一盞半棗三枚擘破同煎至八分去滓食前溫服血餘四物湯三十血餘淨一錢煅灰生地三錢白芍二錢當歸一錢半川芎一錢白茅恨一錢上水煎溫眼或加山梔仁更妙清胃散三一生地四錢丹皮二錢黃芩一錢半升麻六分加味聖愈湯三二人參一錢黃耆二錢蜜炙熟地三錢當歸三錢酒洗川芎一錢半白芍一錢半杜仲二錢鹽水炒續斷一錢半縮砂仁一錢炒上加薑棗水煎溫服加味佛手散三三當歸五錢川芎二錢阿膠二錢蒲黃炒珠蘄艾一錢醋炒杜仲二錢鹽水炒續斷一錢五分白朮二錢土炒條芩一錢上水煎溫服十聖散三四人參黃耆白朮熟地砂仁各五分甘草炙當歸川芎白芍各一錢炒川續斷八分上銼水煎服芎歸湯三五當歸一兩川芎五錢上水煎服益母丸三六益母草五月五日或六月六日採陰乾忌鐵器上一味以石器碾為細末煉蜜丸彈子大每用一丸童便好酒研化服之地黃飲三七熟地四錢山藥二錢炒山萸二錢酒蒸去淨核白苓一錢五分乳制阿膠一錢五分蛤粉炒珠五味五分蜜酒浸炒杜仲二錢鹽水炒續斷一錢五分水煎服慣於小產滑胎者將上分兩一倍作十加魚鰾二兩兔絲子二兩蜜丸梧子大每服三錢空心淡鹽湯送服一料即愈獨參湯三八用好人參二兩或四兩水煎徐徐服千金保胎丸三九治婦人受孕經三月而胎墮者雖氣血不足乃中衝脈有傷中衝脈即陽明胃經供應胎孕至此時必須節飲食絕欲戒怒庶免小產之患服此可以保全白朮土炒熟地薑汁炒杜仲各四兩薑汁炒當歸酒洗續斷酒洗阿膠蛤粉炒香附米四制益母草條芩各二兩炒陳皮川芎艾葉各一兩醋炙砂仁五錢炒上為細末棗肉為丸如桐子大每服百丸空心米湯下平胃散四十厚朴三錢姜炙蒼朮一錢五分米泔炒陳皮一錢五分甘草六分炙下死胎加芒硝一二錢水煎溫服黃連煎四一川黃連上一味煎湯調空房中鼠穴內土服甘麥大棗湯四二甘草三兩小麥一升大棗十枚上以水六升煮取三升溫分三服亦補脾氣香稜丸四三木香丁香各半兩枳殼麩炒三稜酒浸一夕莪朮細銼每一兩用巴豆三十粒去殼同炒待巴豆黃色去巴豆不用青皮川楝子肉茴香各等分炒上為末醋煮麵糊丸桐子大硃砂為衣每服三十丸姜鹽湯送下或溫酒下無時
